<style>
  body { margin:0; }
  @media print {
    .no-print { display: none !important; }
    .print-only { display: block !important; }
  }
  .print-only { display: none; }

  /* Mascota Petroflex */
  /* Mascota Petroflex — una sola animación continua (evita el problema de
     mezclar varias animaciones sobre "transform" al mismo tiempo, que en
     algunos navegadores/celulares no se renderiza bien). */
  @keyframes mascotaCiclo {
    0%   { transform: scale(0) rotate(-8deg); opacity: 0; }
    21%  { transform: scale(1.15) rotate(4deg); opacity: 1; }
    28%  { transform: translateY(-6px) rotate(-11deg) scale(0.93, 1.09); opacity: 1; }
    34%  { transform: translateY(-17px) rotate(9deg) scale(1.07, 0.91); opacity: 1; }
    40%  { transform: translateY(-3px) rotate(-10deg) scale(0.94, 1.08); opacity: 1; }
    47%  { transform: translateY(-15px) rotate(8deg) scale(1.06, 0.93); opacity: 1; }
    53%  { transform: translateY(-1px) rotate(-7deg) scale(0.96, 1.05); opacity: 1; }
    60%  { transform: translateY(-11px) rotate(6deg) scale(1.04, 0.96); opacity: 1; }
    66%  { transform: translateY(-2px) rotate(-4deg); opacity: 1; }
    72%  { transform: translateY(-7px) rotate(3deg); opacity: 1; }
    79%  { transform: translateY(0) rotate(-1deg); opacity: 1; }
    85%  { transform: translateY(0) rotate(0deg) scale(1,1); opacity: 1; }
    100% { transform: scale(0.85) translateY(-6px); opacity: 0; }
  }
  .mascota-wrap {
    animation: mascotaCiclo 2.35s cubic-bezier(.34,1.56,.64,1) both;
    transform-origin: 50% 90%;
    pointer-events: none;
    z-index: 60;
  }
  .mascota-pizarra-texto {
    position: absolute;
    color: #0B3D6B;
    font-weight: 800;
    text-align: center;
    font-family: Oswald, sans-serif;
    line-height: 1.05;
  }
</style>

    const res = await fetch(JSONBIN_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
      body: JSON.stringify(obj),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return true;
  } catch (e) {
    console.error("No se pudo guardar en el almacenamiento compartido:", e);
    return false;
  }
}

async function storageGet(key, shared) {
  if (shared && JSONBIN_CONFIGURADO) {
    const all = await remoteGetAll();
    if (all === null) {
      try {
        return localStorage.getItem("cubicacion_" + key);
      } catch {
        return null;
      }
    }
    const v = all[key];
    return v === undefined ? null : JSON.stringify(v);
  }
  try {
    return localStorage.getItem("cubicacion_" + key);
  } catch {
    return null;
  }
}
async function storageSet(key, value, shared) {
  if (shared && JSONBIN_CONFIGURADO) {
    const all = (await remoteGetAll()) || {};
    try {
      all[key] = JSON.parse(value);
    } catch {
      all[key] = value;
    }
    const ok = await remoteSetAll(all);
    try {
      localStorage.setItem("cubicacion_" + key, value);
    } catch {
      /* ignore */
    }
    return ok;
  }
  try {
    localStorage.setItem("cubicacion_" + key, value);
  } catch {
    /* ignore */
  }
}

function randomSalt() {
  return Array.from(crypto.getRandomValues(new Uint8Array(8)))
    .map((b) => b.toString(16).padStart(2, "0"))
    .join("");
}
async function hashPassword(password, salt) {
  const enc = new TextEncoder().encode(salt + ":" + password);
  const digest = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(digest))
    .map((b) => b.toString(16).padStart(2, "0"))
    .join("");
}

function buscarFlete(comunaNombre, truckType, tabla) {
  const t = tabla || FLETES;
  if (!comunaNombre) return null;
  const tipoBuscado = truckType === "rampla" ? "rampla" : "3/4";
  const matches = t.filter((f) => f.comuna.toLowerCase() === comunaNombre.toLowerCase());
  if (matches.length === 0) return null;
  const exact = matches.find((f) => f.tipo === tipoBuscado);
  if (exact) return { km: exact.km, flete: exact.flete, region: exact.region, fuente: "tabla" };
  // La comuna existe en la tabla pero solo tiene tarifa registrada para el
  // otro tipo de camión. Se usa igualmente el flete FIJO de esa fila (no se
  // recalcula por km × tarifa genérica), ya que ese valor es el costo real
  // del trayecto y debe ser la base para aplicar % de uso + recargo.
  const other = matches[0];
  return { km: other.km, flete: other.flete, region: other.region, fuente: "tabla_otro_tipo" };
}
function regionDeComuna(comunaNombre, tabla) {
  const t = tabla || FLETES;
  if (!comunaNombre) return null;
  const m = t.find((f) => f.comuna.toLowerCase() === comunaNombre.toLowerCase());
  return m ? m.region : null;
}
function camionSugeridoPorRegion(region) {
  if (!region) return null;
  return REGIONES_34.includes(region) ? "3/4" : "rampla";
}
// Usa el tipo real registrado en la tabla de fletes para esa comuna (más
// preciso que la regla genérica por región, ya que la tabla puede tener
// excepciones puntuales como Limache, que va en 3/4 aunque sea V Región).
function camionSugeridoPorComuna(comunaNombre, region, tabla) {
  const t = tabla || FLETES;
  if (!comunaNombre) return null;
  const m = t.find((f) => f.comuna.toLowerCase() === comunaNombre.toLowerCase());
  if (m && m.tipo) return m.tipo;
  return camionSugeridoPorRegion(region);
}

// "Tuberia" en la base = viene en tiras. "Rollo" = viene en rollo.
function etiquetaFormato(formato) {
  return formato === "Rollo" ? "rollo" : "tira";
}
// Verifica que la cantidad ingresada (en metros) sea múltiplo exacto del
// largo de la tira/rollo (ej: tiras de 12m -> solo se pueden pedir 12, 24, 36...).
function evaluarCantidad(input) {
  if (input === null || input === undefined) return 0;
  const str = String(input).trim().replace(/,/g, ".");
  if (str === "") return 0;
  if (!/^[0-9+\-*/().\s]+$/.test(str)) {
    const n = parseFloat(str);
    return isNaN(n) ? 0 : n;
  }
  try {
    const resultado = Function(`"use strict"; return (${str});`)();
    return typeof resultado === "number" && isFinite(resultado) ? resultado : 0;
  } catch {
    return 0;
  }
}

function esMultiploValido(cantidad, largo) {
  if (!largo || largo <= 0) return true;
  if (!cantidad || cantidad <= 0) return true;
  const resto = cantidad % largo;
  const tolerancia = 0.001;
  return resto < tolerancia || largo - resto < tolerancia;
}
// Un producto va obligatoriamente en Rampla si no tiene equivalencia en 3/4,
// o si es una TIRA (no rollo) y su largo supera los 6 metros. Los rollos se
// pueden cargar en 3/4 y Rampla aunque su largo nominal supere los 6m.
function soloRampla(p) {
  if (p.mtsCamion34 === null) return true;
  if (p.formato === "Rollo") return false;
  return parseFloat(p.largo) > 6;
}
function motivoSoloRampla(p) {
  if (p.mtsCamion34 === null) {
    return `${p.codigo} viene en ${etiquetaFormato(p.formato)} de ${fmtMts(p.largo)}: solo se carga en Rampla.`;
  }
  return `${p.codigo} viene en tira de ${fmtMts(p.largo)}: al superar los 6m, solo se puede cargar en Rampla.`;
}

// ===================== MÓDULO DE EMBOQUILLADO (telescopiado) =====================
// Tabla de empaquetado circular (circle packing in circle): razón mínima
// D_host/D_objeto necesaria para que quepan N círculos chicos dentro de uno grande.
const PACKING_TABLE = [
  [1, 1.0], [2, 2.0], [3, 2.1547], [4, 2.4142], [5, 2.7013],
  [6, 3.0], [7, 3.0], [8, 3.3032], [9, 3.6131], [10, 3.813],
  [11, 3.9238], [12, 4.0296], [13, 4.2361], [14, 4.3284], [15, 4.5214],
  [16, 4.6154], [17, 4.792], [18, 4.8637], [19, 4.8637], [20, 5.1223],
];
const HOLGURA_EMBOQUILLADO = 0.9; // 10% de holgura/prudencia

function materialDe(desc) {
  const d = (desc || "").toUpperCase();
  if (d.includes("PETROPIPE")) return "PETROPIPE";
  if (d.includes("HDPE")) return "HDPE";
  if (d.includes("PVC")) return "PVC";
  return "OTRO";
}
// HDPE requiere aprobación del Admin para poder emboquillarse.
function requiereAprobacionEmboquillado(it) {
  return materialDe(it.desc) === "HDPE";
}

function nTeoricoEmboquillado(dHost, dObjeto) {
  if (!dHost || !dObjeto || dObjeto <= 0) return 1;
  const ratio = dHost / dObjeto;
  let n = 1;
  for (const [cand, minRatio] of PACKING_TABLE) {
    if (ratio >= minRatio) n = cand;
  }
  return n;
}
function capacidadEmboquillado(dHost, dObjeto) {
  const nt = nTeoricoEmboquillado(dHost, dObjeto);
  return Math.max(1, Math.floor(nt * HOLGURA_EMBOQUILLADO));
}

// Recibe lista de { diam, cantidad } de productos marcados como "Emboquillado",
// agrupados por diámetro (sumando tiras de igual diámetro). Devuelve
// { bultosFinales, granelResultante } donde cada bulto final es la unidad que
// realmente ocupa espacio en el camión, ya con todo anidado. Prioridad: a cada
// diámetro anfitrión, se atienden primero los objetos en espera de MAYOR
// diámetro (más grandes), luego los más chicos.
function calcularEmboquillado(gruposPorDiametro) {
  const porDiam = {};
  gruposPorDiametro.forEach((g) => {
    porDiam[g.diam] = (porDiam[g.diam] || 0) + g.cantidad;
  });
  const diamsOrdenados = Object.keys(porDiam).map(Number).sort((a, b) => a - b);

  let pendientes = []; // [{diam, cantidad}] esperando host, se prioriza mayor diam primero
  const bultosFinales = []; // unidades que NO se vuelven a anidar en nada mayor (ocupan espacio real)
  const historial = []; // registro de TODAS las etapas (incluye intermedias) para mostrar el detalle al usuario

  diamsOrdenados.forEach((d, idx) => {
    const esUltimo = idx === diamsOrdenados.length - 1;
    let hostsDisponibles = porDiam[d];
    const contenido = [];

    pendientes.sort((a, b) => b.diam - a.diam);
    const nuevosPendientes = [];
    for (const obj of pendientes) {
      if (hostsDisponibles <= 0) {
        nuevosPendientes.push(obj);
        continue;
      }
      const cap = capacidadEmboquillado(d, obj.diam);
      const hostsNecesarios = Math.ceil(obj.cantidad / cap);
      const hostsUsar = Math.min(hostsNecesarios, hostsDisponibles);
      const colocados = Math.min(obj.cantidad, hostsUsar * cap);
      hostsDisponibles -= hostsUsar;
      const restante = obj.cantidad - colocados;
      if (colocados > 0) {
        contenido.push({ diam: obj.diam, cantidad: colocados, hosts: hostsUsar, cap });
        historial.push({ diamExterior: d, contenidoDiam: obj.diam, hostsUsados: hostsUsar, cantidadContenida: colocados });
      }
      if (restante > 0) nuevosPendientes.push({ diam: obj.diam, cantidad: restante });
    }
    pendientes = nuevosPendientes;

    const hostsUsadosTotal = contenido.reduce((s, c) => s + c.hosts, 0);
    const hostsLibres = porDiam[d] - hostsUsadosTotal;

    if (esUltimo) {
      contenido.forEach((c) => {
        bultosFinales.push({ diamExterior: d, contenidoDiam: c.diam, cantidadContenida: c.cantidad, bultos: c.hosts });
      });
      if (hostsLibres > 0) {
        bultosFinales.push({ diamExterior: d, contenidoDiam: null, cantidadContenida: 0, bultos: hostsLibres, vacio: true });
      }
    } else {
      pendientes.push({ diam: d, cantidad: porDiam[d] });
    }
  });

  const granelResultante = pendientes.filter((p) => p.cantidad > 0);

  return { bultosFinales, granelResultante, historial };
}

function detalleParaExportar(trips, cargaActual, cargaActualInfo) {
  const rows = [];
  if (cargaActual && cargaActual.length > 0) {
    cargaActual.forEach((it) =>
      rows.push({
        ...it,
        origen: "Carga actual (sin guardar)",
        destino: (cargaActualInfo && cargaActualInfo.comuna) || "-",
        camion: (cargaActualInfo && cargaActualInfo.truck) || "-",
        camiones: (cargaActualInfo && cargaActualInfo.camiones) || 1,
        pctUso: cargaActualInfo && cargaActualInfo.pct != null ? cargaActualInfo.pct : "",
        fleteViaje: cargaActualInfo && cargaActualInfo.flete != null ? cargaActualInfo.flete : "",
      })
    );
  }
  for (const t of trips) {
    if (rows.length >= 20) break;
    const det = t.detalle || [];
    const camiones = 1 + (t.camionesAdicionales || 0);
    for (const d of det) {
      if (rows.length >= 20) break;
      rows.push({
        ...d,
        origen: `${t.fecha} · ${t.user}`,
        destino: t.comuna || "-",
        camion: t.truck || "-",
        camiones,
        pctUso: t.pct != null ? t.pct : "",
        fleteViaje: t.flete != null ? t.flete : "",
      });
    }
  }
  return rows.slice(0, 20);
}

function exportarExcel(trips, cargaActual, cargaActualInfo) {
  const rows = detalleParaExportar(trips, cargaActual, cargaActualInfo).map((r) => ({
    "Fecha / Usuario": r.origen,
    Código: r.codigo,
    Producto: r.desc,
    Cantidad: r.cantidad,
    "UM / Medidas": r.um,
    "% Ítem en Camión": r.pct,
    "Peso (kg)": r.peso,
    Destino: r.destino,
    "Tipo Camión": r.camion,
    "N° Camiones": r.camiones,
    "% Uso Total Camión": r.pctUso,
    "Flete ($)": r.fleteViaje,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Detalle codigos");
  XLSX.writeFile(wb, "detalle_codigos_cubicacion.xlsx");
}

// Exporta la tabla completa de ciudades y tarifas de flete (comuna, región,
// tipo de camión, km y flete), más una hoja con las tarifas por km vigentes.
function exportarFletesExcel(fletes, tarifasKm) {
  const rows = fletes.map((f) => ({
    Comuna: f.comuna,
    Región: f.region || "",
    "Tipo Camión": f.tipo === "rampla" ? "Rampla" : "3/4",
    Km: f.km,
    "Flete ($)": f.flete,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [{ wch: 26 }, { wch: 26 }, { wch: 12 }, { wch: 10 }, { wch: 14 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Ciudades y Fletes");

  const wsTarifas = XLSX.utils.json_to_sheet([
    { Camión: "3/4", "Tarifa ($/km)": tarifasKm["3/4"] },
    { Camión: "Rampla", "Tarifa ($/km)": tarifasKm.rampla },
  ]);
  wsTarifas["!cols"] = [{ wch: 12 }, { wch: 16 }];
  XLSX.utils.book_append_sheet(wb, wsTarifas, "Tarifas por km");

  XLSX.writeFile(wb, "ciudades_y_tarifas_cubicacion.xlsx");
}

function enviarPorCorreo(trips, cargaActual, cargaActualInfo) {
  const rows = detalleParaExportar(trips, cargaActual, cargaActualInfo);
  const lines = rows.map(
    (r) =>
      `${r.codigo} - ${r.desc} - ${r.cantidad} ${r.um} - ${r.pct}% ítem - ${r.origen} | Destino: ${r.destino} · Camión: ${r.camion} (${r.camiones}) · Uso total: ${r.pctUso}% · Flete: ${
        r.fleteViaje !== "" ? fmtCLP(r.fleteViaje) : "-"
      }`
  );
  const body = encodeURIComponent(
    "Detalle de códigos calculados (máx. 20):\n\n" + lines.join("\n")
  );
  const subject = encodeURIComponent("Detalle de códigos - Cubicación");
  const a = document.createElement("a");
  a.href = `mailto:?subject=${subject}&body=${body}`;
  a.target = "_blank";
  a.rel = "noopener noreferrer";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

  const tiene12m = items.some(
    (it) => it.tipo === "catalogo" && it.formato === "Tuberia" && parseFloat(it.largo) === 12
  );
  const pctEn34 = items.reduce((s, it) => {
    if (it.tipo === "catalogo") {
      const cap = it.mtsCamion34;
      if (!cap || cap <= 0) return s + 100; // no cabe en 3/4 a ningún nivel: cuenta como excedido
      return s + (it.cantidad / cap) * 100;
    }
    const l = parseFloat(it.largo) || 0;
    const a = parseFloat(it.ancho) || 0;
    const h = parseFloat(it.alto) || 0;
    const q = parseInt(it.qty) || 0;
    const volumen = (l * a * h * q) / 1e6;
    return s + (TRUCKS["3/4"].capacidad > 0 ? (volumen / TRUCKS["3/4"].capacidad) * 100 : 0);

  const excedeCapacidad34 = pctEn34 > 100;

  const requiereAutorizacionRampla =
    !!me && me.role !== "admin" && truckType === "rampla" && esSantiagoASeptima && !tiene12m && !excedeCapacidad34 && items.length > 0;
  const solicitudActual = requiereAutorizacionRampla

  function handleCatalogoExcelFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 6, defval: null });
        // Detecta encabezados reales (fila 7 en el Excel original = header index 6)
        let dataRows = XLSX.utils.sheet_to_json(ws, { defval: null });
        if (dataRows.length === 0 || !("Codigo" in dataRows[0])) {
          dataRows = XLSX.utils.sheet_to_json(ws, { range: 0, defval: null });
        }
        let added = 0;
        let skipped = 0;
        const nuevos = [];
        for (const row of dataRows) {
          const codigo = row.Codigo ?? row.codigo ?? row.CODIGO;
          const mtsRampla = row.MtsXrampla ?? row.mtsRampla ?? row["Mts x Rampla"];
          if (!codigo || mtsRampla === null || mtsRampla === undefined) {
            skipped++;
            continue;
          }
          const um = String(row.UM ?? row.um ?? "MT");
          const largo = parseFloat(row.LARGO ?? row.largo ?? row.Largo ?? 0) || null;
          const pesoRaw = row.Peso ?? row.peso ?? null;
          const formato = row.Formato ?? row.formato ?? "Tuberia";
          let pesoPorMetro = null;
          if (pesoRaw !== null && largo) {
            pesoPorMetro = um === "TR" ? Number(pesoRaw) / largo : Number(pesoRaw);
          }
          nuevos.push({
            codigo: String(codigo),
            desc: String(row.Descripcion ?? row.descripcion ?? ""),
            um,
            formato,
            diam: row.DIAM ?? row.diam ?? null,
            largo,
            peso: pesoRaw,
            pesoPorMetro,
            rollosRampla: row.RollosXrampla ?? row.rollosRampla ?? null,
            mtsRampla: Number(mtsRampla),
            mtsCamion34: row["MtsXcamion 3/4"] ?? row.mtsCamion34 ?? null,
          });
          added++;
        }
        const next = [...catalogoExtra.filter((e) => !nuevos.find((n) => n.codigo === e.codigo)), ...nuevos];
        persistCatalogoExtra(next);
        setCatAdminMsg(`Excel cargado: ${added} productos agregados/actualizados, ${skipped} filas omitidas.`);
      } catch (err) {
        setCatAdminMsg("No se pudo leer el archivo. Verifica que sea el formato esperado (Codigo, Descripcion, UM, DIAM, LARGO, Peso, RollosXrampla, MtsXrampla, MtsXcamion 3/4, Formato).");
      }
      if (fileInputRef.current) fileInputRef.current.value = "";
    };
    reader.readAsBinaryString(file);
  }

  function buscarProductoPorCodigo(codigoRaw) {
    const norm = (s) => String(s ?? "").trim().toUpperCase().replace(/\s+/g, "");
    const codigo = norm(codigoRaw);
    if (!codigo) return null;
    let p = catalogoActivo.find((x) => norm(x.codigo) === codigo);
    if (p) return p;
    const base = codigo.split("-")[0];
    p = catalogoActivo.find((x) => norm(x.codigo).split("-")[0] === base);
    return p || null;
  }

  function handleImportarPedidoExcel(file) {
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        let agregados = 0;
        const noEncontrados = [];
        let encontroTabla = false;

        for (const sheetName of wb.SheetNames) {
          const ws = wb.Sheets[sheetName];
          const filas = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

          let headerRowIdx = -1;
          let colCodigo = -1;
          let colCantidad = -1;
          for (let i = 0; i < filas.length; i++) {
            const fila = filas[i];
            if (!Array.isArray(fila)) continue;
            let cIdx = -1;
            let qIdx = -1;
            fila.forEach((cell, idx) => {
              const t = String(cell ?? "").trim().toLowerCase();
              if (/^c[oó]digo$/.test(t)) cIdx = idx;
              if (/^cantidad$|^metros$|^mts$/.test(t)) qIdx = idx;
            });
            if (cIdx >= 0 && qIdx >= 0) {
              headerRowIdx = i;
              colCodigo = cIdx;
              colCantidad = qIdx;
              break;
            }
          }
          if (headerRowIdx === -1) continue;

          encontroTabla = true;
          for (let i = headerRowIdx + 1; i < filas.length; i++) {
            const fila = filas[i];
            if (!Array.isArray(fila)) continue;
            const codigo = fila[colCodigo];
            const cantidadRaw = fila[colCantidad];
            if (!codigo) continue;
            const cantidad = evaluarCantidad(cantidadRaw);
            if (cantidad <= 0) continue;
            const producto = buscarProductoPorCodigo(codigo);
            if (!producto) {
              noEncontrados.push(String(codigo));
              continue;
            }
            agregarItemDesdeProducto(producto, cantidad);
            agregados++;
          }
          break;
        }

        if (!encontroTabla) {
          setImportMsg(
            "No se encontraron columnas 'Código' y 'Cantidad' (o 'Metros'/'Mts') en ninguna hoja del archivo. Revisa el formato."
          );
        } else {
          setImportMsg(
            `Importación Excel: ${agregados} producto(s) agregados.` +
              (noEncontrados.length > 0 ? ` ${noEncontrados.length} código(s) no reconocidos: ${noEncontrados.join(", ")}.` : "")
          );
        }
      } catch (err) {
        setImportMsg("No se pudo leer el Excel. Verifica que tenga columnas de Código y Cantidad/Metros.");
      }
      if (importInputRef.current) importInputRef.current.value = "";
    };
    reader.readAsBinaryString(file);
  }

  // Lectura de PDF: extrae todo el texto del documento y busca, token por
  // token, coincidencias con códigos reales del catálogo activo; el primer
  // número válido que aparece después del código se toma como cantidad.
  // Es un método heurístico (depende de cómo esté armado el PDF), funciona
  // mejor con PDFs tabulares simples (código, descripción, cantidad).
  async function handleImportarPedidoPDF(file) {
    try {
      if (window.pdfjsLib && !pdfjsLib.GlobalWorkerOptions.workerSrc) {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let textoCompleto = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        textoCompleto += " " + content.items.map((it) => it.str).join(" ");
      }
      const tokens = textoCompleto.split(/\s+/).filter(Boolean);
      const codigosSet = new Set(catalogoActivo.map((p) => String(p.codigo).trim().toUpperCase()));
      let agregados = 0;
      const vistos = new Set();
      for (let i = 0; i < tokens.length; i++) {
        const tok = tokens[i].toUpperCase();
        if (!codigosSet.has(tok) || vistos.has(tok)) continue;
        // busca el primer numero valido (>0) en los siguientes 6 tokens
        for (let j = i + 1; j < Math.min(i + 7, tokens.length); j++) {
          const cand = tokens[j].replace(/\./g, "").replace(",", ".");
          const cantidad = evaluarCantidad(cand);
          if (cantidad > 0) {
            const producto = buscarProductoPorCodigo(tok);
            if (producto) {
              agregarItemDesdeProducto(producto, cantidad);
              agregados++;
              vistos.add(tok);
            }
            break;
          }
        }
      }
      setImportMsg(
        agregados > 0
          ? `Importación PDF: ${agregados} producto(s) agregados (revisa las cantidades, la lectura de PDF es aproximada).`
          : "No se reconocieron códigos de catálogo en el PDF. Prueba con un Excel para mayor precisión."
      );
    } catch (err) {
      setImportMsg("No se pudo leer el PDF. Prueba con un archivo Excel.");
    }
    if (importInputRef.current) importInputRef.current.value = "";
  }

  function handleImportarPedido(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImportMsg("Procesando archivo...");
    if (/\.(xlsx|xls|csv)$/i.test(file.name)) {
      handleImportarPedidoExcel(file);
    } else if (/\.pdf$/i.test(file.name)) {
      handleImportarPedidoPDF(file);
    } else {
      setImportMsg("Formato no soportado. Sube un archivo Excel (.xlsx/.xls/.csv) o PDF.");
      if (importInputRef.current) importInputRef.current.value = "";
    }
  }

  async function saveTrip() {
    if (items.length === 0) return;
    if (necesitaDecision) return; // falta decidir consolidado/full
    if (bloqueadoPorAutorizacion) return; // requiere autorización del admin
    const fecha = new Date().toLocaleString("es-CL");
    const detalle = fracciones.map((it) =>
      it.tipo === "catalogo"
        ? {
            codigo: it.codigo,
            desc: it.desc,
            cantidad: it.cantidad,
            um: "m",
            pct: Math.round(it.frac * 1000) / 10,
            peso: it.pesoTotal ? Math.round(it.pesoTotal * 100) / 100 : "",
          }
        : {
            codigo: "Manual",
            desc: it.nombre || "Manual",
            cantidad: it.qty,
            um: `${it.largo}×${it.ancho}×${it.alto}cm`,
            pct: Math.round(it.frac * 1000) / 10,
            peso: "",
          }
    );
    const nuevoId = Date.now();
    // Versionado: si se está editando un viaje guardado, esta grabación es
    // una VERSIÓN NUEVA de esa cadena (mismo origenId, version+1, referencia
    // al padre) — el registro original NUNCA se toca ni se borra.
    const esEdicion = !!editandoTrip;
    const record = {
      id: nuevoId,
      origenId: esEdicion ? editandoTrip.origenId : nuevoId,
      version: esEdicion ? (editandoTrip.version || 1) + 1 : 1,
      editadoDeId: esEdicion ? editandoTrip.id : null,
      user: session,
      truck: truck.label,
      truckType,
      modoCarga,
      items: items.map((it) =>
        it.tipo === "catalogo" ? `${it.codigo} (${it.cantidad} m)` : `${it.nombre || "Manual"} x${it.qty}`
      ),
      itemsRaw: items,
      detalle,
      pct: Math.round(pct),
      pesoTotal: pesoTotalCarga,
      comuna: comunaInput || null,
      km: km_n,
      flete: fleteFinal,
      consolidado: pct > 0 && pct < 90,
      camionesAdicionales,
      modoExceso,
      fecha,
    };
    const next = [record, ...trips].slice(0, 50);
    setTrips(next);
    await storageSet("trips", JSON.stringify(next), true);

    const aviso = {
      id: Date.now() + 1,
      user: session,
      fecha,
      resumen: `${session} guardó un cálculo${esEdicion ? ` (edición v${record.version})` : ""}: ${record.items.length} producto(s), ${truck.label}, ${Math.round(pct)}% usado${comunaInput ? `, destino ${comunaInput}` : ""}.`,
      leido: false,
    };
    const avisosActuales = await storageGet("avisos", true);
    let listaAvisos = [];
    try {
      listaAvisos = avisosActuales ? JSON.parse(avisosActuales) : [];
    } catch {
      listaAvisos = [];
    }
    const nextAvisos = [aviso, ...listaAvisos].slice(0, 100);
    setAvisos(nextAvisos);
    await storageSet("avisos", JSON.stringify(nextAvisos), true);

    // Ya no se vacía el carrito al guardar: se deja tal cual para que el
    // flete recién guardado quede visible. Para empezar un viaje nuevo, el
    // usuario usa el botón "Nuevo viaje" (o "Editar" desde el historial).
    setEditandoTrip(null);
    setGuardadoActual(true);
    setSavedMsg(esEdicion ? `Viaje guardado (versión ${record.version})` : "Viaje guardado");
    setTimeout(() => setSavedMsg(""), 2500);
    setMascotaGuardarKey((k) => k + 1);
  }

  async function solicitarAprobacionHDPE(it) {
    const actuales = await storageGet("aprobacionesHDPE", true);
    let lista = [];
    try {
      lista = actuales ? JSON.parse(actuales) : [];
    } catch {
      lista = [];
    }
    const yaExiste = lista.find(
      (s) => s.user === session && s.codigo === it.codigo && s.estado === "pendiente"
    );
    if (yaExiste) return;
    // Busca en qué diámetro(s) mayor se está anidando este ítem, para que el
    // admin vea exactamente qué se le pide aprobar (no solo el código suelto).
    const cadenaAnidado = [];
    fracciones.forEach((f) => {
      if (f.esFilaGrupoEmboquillado && f.detalleEmboquillado && f.detalleEmboquillado.historial) {
        f.detalleEmboquillado.historial.forEach((h) => {
          if (h.contenidoDiam === it.diam) {
            cadenaAnidado.push(
              `${h.hostsUsados} tubo${h.hostsUsados !== 1 ? "s" : ""} de ${h.diamExterior}mm contiene${h.hostsUsados !== 1 ? "n" : ""} ${h.cantidadContenida} tubo${h.cantidadContenida !== 1 ? "s" : ""} de ${h.contenidoDiam}mm`
            );
          }
        });
      }
    });
    const solicitud = {
      id: Date.now(),
      user: session,
      codigo: it.codigo,
      desc: it.desc,
      diam: it.diam,
      cantidad: it.cantidad,
      estado: "pendiente",
      fecha: new Date().toLocaleString("es-CL"),
      // Contexto del viaje al momento de la solicitud, para que el admin no
      // tenga que adivinar qué se le está pidiendo aprobar.
      comuna: comunaInput || null,
      truck: truck.label,
      cadenaAnidado,
      itemsPedido: items.map((x) =>
        x.tipo === "catalogo" ? `${x.codigo} (${x.cantidad} m)` : `${x.nombre || "Manual"} x${x.qty}`
      ),
    };
    const next = [solicitud, ...lista].slice(0, 100);
    setAprobacionesHDPE(next);
    await storageSet("aprobacionesHDPE", JSON.stringify(next), true);

    const aviso = {
      id: Date.now() + 2,
      user: session,
      fecha: solicitud.fecha,
      resumen: `${session} solicita aprobación para emboquillar HDPE: ${it.codigo} — ${it.desc}.`,
      leido: false,
      esAprobacionHDPE: true,
    };
    const avisosActuales = await storageGet("avisos", true);
    let listaAvisos = [];
    try {
      listaAvisos = avisosActuales ? JSON.parse(avisosActuales) : [];
    } catch {
      listaAvisos = [];
    }
    const nextAvisos = [aviso, ...listaAvisos].slice(0, 100);
    setAvisos(nextAvisos);
    await storageSet("avisos", JSON.stringify(nextAvisos), true);
  }

  async function refrescarMisAprobaciones() {
    const actuales = await storageGet("aprobacionesHDPE", true);

      })
    );
  }


  async function handleAddUser() {
    setAdminMsg("");
    const uname = newUser.username.trim();
    const pass = newUser.password;
    if (!uname || !pass) {
      setAdminMsg("Completa usuario y clave.");
      return;
    }
    if (!ALNUM_RE.test(pass) || pass.length < 6) {
      setAdminMsg("La clave debe ser alfanumérica (solo letras y números) y de al menos 6 caracteres.");
      return;
    }
    if (users.find((u) => u.username.toLowerCase() === uname.toLowerCase())) {
      setAdminMsg("Ese usuario ya existe.");
      return;
    }
    const salt = randomSalt();
    const hash = await hashPassword(pass, salt);
    const next = [...users, { username: uname, salt, hash, role: newUser.role, blocked: false }];
    await persistUsers(next);
    setNewUser({ username: "", password: "", role: "user" });
    setAdminMsg("Usuario creado.");
  }

    const hash = await hashPassword(pwForm.nueva, salt);
    const next = users.map((u) => (u.username === session ? { ...u, salt, hash } : u));

            <input placeholder="Región" value={ciudadNewForm.region} onChange={(e) => setCiudadNewForm({ ...ciudadNewForm, region: e.target.value })} style={inputStyle()} className="rounded px-2.5 py-2 text-sm outline-none col-span-2" />
            <select value={ciudadNewForm.tipo} onChange={(e) => setCiudadNewForm({ ...ciudadNewForm, tipo: e.target.value })} style={inputStyle()} className="rounded px-2.5 py-2 text-sm outline-none">

              <option value="rampla">Rampla</option>

            <input placeholder="Km" type="number" value={ciudadNewForm.km} onChange={(e) => setCiudadNewForm({ ...ciudadNewForm, km: e.target.value })} style={inputStyle()} className="rounded px-2.5 py-2 text-sm outline-none" />
            <input placeholder="Flete ($)" type="number" value={ciudadNewForm.flete} onChange={(e) => setCiudadNewForm({ ...ciudadNewForm, flete: e.target.value })} style={inputStyle()} className="rounded px-2.5 py-2 text-sm outline-none" />

          {ciudadAdminMsg && (

        <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4">

              <button

                className="rounded px-3 py-1.5 text-xs font-semibold flex items-center gap-1.5"
              >
                <FileSpreadsheet size={13} /> Exportar Excel
              </button>
              <input
                placeholder="Buscar comuna o región..."
                value={ciudadAdminSearch}
                onChange={(e) => setCiudadAdminSearch(e.target.value)}

          <div className="space-y-2 max-h-96 overflow-y-auto">

                  <div className="grid grid-cols-2 sm:grid-cols-5 gap-2 mb-2">
                    <input placeholder="Comuna" value={ciudadEditValues.comuna} onChange={(e) => setCiudadEditValues({ ...ciudadEditValues, comuna: e.target.value })} style={inputStyle()} className="rounded px-2 py-1.5 outline-none col-span-2" />
                    <input placeholder="Región" value={ciudadEditValues.region} onChange={(e) => setCiudadEditValues({ ...ciudadEditValues, region: e.target.value })} style={inputStyle()} className="rounded px-2 py-1.5 outline-none col-span-2" />
                    <select value={ciudadEditValues.tipo} onChange={(e) => setCiudadEditValues({ ...ciudadEditValues, tipo: e.target.value })} style={inputStyle()} className="rounded px-2 py-1.5 outline-none">

                    <input placeholder="Flete ($)" type="number" value={ciudadEditValues.flete} onChange={(e) => setCiudadEditValues({ ...ciudadEditValues, flete: e.target.value })} style={inputStyle()} className="rounded px-2 py-1.5 outline-none" />

                  </span>

          {!ciudadAdminSearch && fletesActivo.length > 30 && (

            </p>

      </div>

  if (view === "avisos") {
    const pendientesHDPE = aprobacionesHDPE.filter((s) => s.estado === "pendiente");
    const resueltasHDPE = aprobacionesHDPE.filter((s) => s.estado !== "pendiente");
    return (
      <div style={{ background: COLORS.panel, color: COLORS.text, minHeight: 480, fontFamily: "Inter, sans-serif" }} className="p-4 sm:p-6">
        <style>{fontImport}</style>
        {Header}
        <div className="flex items-center justify-between mb-4">
          <h2 style={{ fontFamily: "Oswald, sans-serif", color: COLORS.navy }} className="text-lg font-bold uppercase">

          {avisos.some((a) => !a.leido) && (
            <button onClick={marcarAvisosLeidos} style={{ color: COLORS.navy }} className="text-xs font-semibold hover:opacity-70">
              Marcar todos como leídos
            </button>

        <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4 mb-5">

            Solicitudes de emboquillado HDPE pendientes ({pendientesHDPE.length})
          </span>
          {pendientesHDPE.length === 0 ? (
            <p style={{ color: COLORS.muted }} className="text-sm">

            </p>

            <div className="space-y-2">

                <div key={s.id} style={{ background: COLORS.panel2, border: `1px solid ${COLORS.border}` }} className="rounded p-3 text-xs">

                    <span>
                      <b>{s.user}</b> · {s.codigo} — {s.desc} · {s.cantidad} m · {s.fecha}
                    </span>
                    <div className="flex items-center gap-3">
                      <button onClick={() => resolverAprobacionHDPE(s.id, false)} style={{ color: COLORS.danger }} className="flex items-center gap-1 font-semibold hover:opacity-70">
                        <X size={13} /> Rechazar
                      </button>
                      <button onClick={() => resolverAprobacionHDPE(s.id, true)} style={{ color: COLORS.navy }} className="flex items-center gap-1 font-semibold hover:opacity-70">
                        <Check size={13} /> Aprobar
                      </button>
                    </div>
                  </div>
                  {(s.comuna || s.truck || (s.cadenaAnidado && s.cadenaAnidado.length > 0) || (s.itemsPedido && s.itemsPedido.length > 0)) && (
                    <div style={{ color: COLORS.muted, borderTop: `1px solid ${COLORS.border}` }} className="mt-2 pt-2 space-y-1">
                      {(s.comuna || s.truck) && (
                        <div>
                          <MapPin size={11} className="inline mb-0.5" /> Destino: {s.comuna || "sin comuna indicada"}
                          {s.truck ? ` · Camión: ${s.truck}` : ""}
                        </div>
                      )}
                      {s.cadenaAnidado && s.cadenaAnidado.length > 0 && (
                        <div>
                          <div style={{ color: COLORS.text }} className="font-semibold">Se solicita anidar en:</div>
                          {s.cadenaAnidado.map((c, i) => (
                            <div key={i}>{c}</div>
                          ))}
                        </div>
                      )}
                      {s.itemsPedido && s.itemsPedido.length > 0 && (
                        <div>
                          <div style={{ color: COLORS.text }} className="font-semibold">Resto del pedido:</div>
                          {s.itemsPedido.join(", ")}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
          {resueltasHDPE.length > 0 && (
            <div className="space-y-2 mt-3 max-h-40 overflow-y-auto">
              {resueltasHDPE.map((s) => (
                <div key={s.id} style={{ background: COLORS.panel2, border: `1px solid ${COLORS.border}`, position: "relative", overflow: "visible" }} className="rounded px-3 py-2 text-xs">
                  {s.id === ultimaSolicitudAprobadaId && (
                    <Mascota tipo="aprobado" size={64} style={{ position: "absolute", right: -6, top: -30 }} />
                  )}
                  <b>{s.user}</b> · {s.codigo} — {s.desc} ·{" "}
                  <span style={{ color: s.estado === "aprobado" ? COLORS.navy : COLORS.danger }} className="font-semibold">
                    {s.estado === "aprobado" ? "Aprobado" : "Rechazado"}
                  </span>
                </div>
              ))}
            </div>

        </div>

        <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4">
          <span style={{ color: COLORS.muted }} className="text-xs uppercase tracking-wide mb-3 block">
            Cálculos guardados por los usuarios ({avisos.length})
          </span>
          {avisos.length === 0 ? (
            <p style={{ color: COLORS.muted }} className="text-sm">
              Aún no hay avisos.
            </p>

            <div className="space-y-2 max-h-96 overflow-y-auto">
              {avisos.map((a) => (
                <div
                  key={a.id}
                  style={{ background: a.leido ? COLORS.panel2 : "#FFF7E6", border: `1px solid ${a.leido ? COLORS.border : COLORS.celeste}` }}
                  className="rounded px-3 py-2 text-xs"
                >
                  {!a.leido && <b style={{ color: COLORS.danger }}>● </b>}
                  {a.resumen} <span style={{ color: COLORS.muted }}>— {a.fecha}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );

  if (view === "solicitudes") {
    const pendientes = authRequests.filter((r) => r.estado === "pendiente");
    const resueltas = authRequests.filter((r) => r.estado !== "pendiente");
    return (
      <div style={{ background: COLORS.panel, color: COLORS.text, minHeight: 480, fontFamily: "Inter, sans-serif" }} className="p-4 sm:p-6">
        <style>{fontImport}</style>
        {Header}
        <h2 style={{ fontFamily: "Oswald, sans-serif", color: COLORS.navy }} className="text-lg font-bold uppercase mb-4">
          Solicitudes de autorización — Rampla a la Séptima Región
        </h2>

        <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4 mb-5">

                      <button onClick={() => resolverSolicitud(r.id, "aprobada")} style={{ color: COLORS.navy }} className="flex items-center gap-1 font-semibold hover:opacity-70">

                      </button>

          <span style={{ color: COLORS.muted }} className="text-xs uppercase tracking-wide mb-3 block">

                  <span>
                    <b>{r.user}</b> · {r.comuna} ({r.region}) · Rampla · {r.pct}% · {r.fechaTexto} —{" "}
                    <span style={{ color: r.estado === "aprobada" ? COLORS.navy : COLORS.danger }} className="font-semibold">

                    </span>{" "}
                    por {r.resueltoPor} el {r.resueltoFecha}
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  if (view === "cuenta") {

      <div style={{ background: COLORS.panel, color: COLORS.text, minHeight: 480, fontFamily: "Inter, sans-serif" }} className="p-4 sm:p-6">

        </h2>
        <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4 max-w-sm">

          <div className="space-y-2.5">
            <Field label="Clave actual">
              <PasswordInput
                value={pwForm.actual}

                style={inputStyle()}
                className="w-full rounded px-2.5 py-2 text-sm outline-none"

            </Field>
            <Field label="Clave nueva (alfanumérica, 6+ caracteres)">
              <PasswordInput
                value={pwForm.nueva}
                onChange={(e) => setPwForm({ ...pwForm, nueva: e.target.value })}
                style={inputStyle()}
                className="w-full rounded px-2.5 py-2 text-sm outline-none"
              />
            </Field>
            <Field label="Confirmar clave nueva">
              <PasswordInput
                value={pwForm.confirmar}
                onChange={(e) => setPwForm({ ...pwForm, confirmar: e.target.value })}
                style={inputStyle()}
                className="w-full rounded px-2.5 py-2 text-sm outline-none"
              />
            </Field>
          </div>
          {pwMsg && (
            <p style={{ color: pwMsg.includes("correctamente") ? COLORS.navy : COLORS.danger }} className="text-xs mt-3">
              {pwMsg}
            </p>
          )}
          <button
            onClick={handleChangePassword}
            style={{ background: COLORS.navy, color: "#FFFFFF" }}
            className="w-full rounded py-2.5 mt-4 font-semibold text-sm flex items-center justify-center gap-2"
          >
            <Save size={15} /> Guardar nueva clave
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: COLORS.panel, color: COLORS.text, minHeight: 480, fontFamily: "Inter, sans-serif" }} className="p-4 sm:p-6">
      <style>{fontImport}</style>
      {Header}

      <div className="flex gap-2 mb-2 no-print">
        {Object.entries(TRUCKS).map(([key, t]) => (
          <button
            key={key}
            onClick={() => selectTruckManually(key)}
            style={{
              background: truckType === key ? COLORS.navy : COLORS.bg,
              color: truckType === key ? "#FFFFFF" : COLORS.text,
              border: `1px solid ${truckType === key ? COLORS.navy : COLORS.border}`,
            }}
            className="flex-1 rounded-lg py-2.5 px-3 text-sm font-semibold transition"
          >
            {t.label}
            <span style={{ opacity: 0.75 }} className="block text-xs font-normal">
              {t.largo}×{t.ancho}×{t.alto} m
            </span>
          </button>
        ))}
      </div>
      {truckLockNote && (
        <p style={{ color: COLORS.danger }} className="text-xs flex items-center gap-1.5 mb-3 no-print">
          <Info size={13} /> {truckLockNote}
        </p>
      )}
      {!truckLockNote && <div className="mb-3 no-print" />}

      <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4 mb-5 no-print">
        <div className="flex items-baseline justify-between">
          <span style={{ color: COLORS.muted }} className="text-xs uppercase tracking-wide">
            Volumen usado
          </span>
          <span style={{ fontFamily: "Oswald, sans-serif", color: overCapacity ? COLORS.danger : COLORS.navy }} className="text-xl font-bold">
            {pct.toFixed(0)}%
          </span>

        {overCapacity && (
          <div style={{ color: COLORS.danger }} className="flex items-center gap-1.5 mt-3 text-sm font-medium">

      <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4 mb-3 no-print">
        <span style={{ color: COLORS.muted }} className="text-xs uppercase tracking-wide flex items-center gap-1.5 mb-3">
          <Package size={14} /> Tipo de carga para los próximos códigos a agregar
        </span>
        <div className="flex flex-wrap gap-2">

            <button
              key={op.v}
              onClick={() => setModoCarga(op.v)}
              style={{
                background: modoCarga === op.v ? COLORS.navy : COLORS.panel2,
                color: modoCarga === op.v ? "#fff" : COLORS.text,
                border: `1px solid ${modoCarga === op.v ? COLORS.navy : COLORS.border}`,
              }}
              className="rounded px-3 py-1.5 text-xs font-medium flex items-center gap-1.5"

              {modoCarga === op.v && <Check size={13} />}
              {op.label}

        </div>
      </div>

      <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4 mb-3 no-print">
        <span style={{ color: COLORS.muted }} className="text-xs uppercase tracking-wide flex items-center gap-1.5 mb-3">
          <FileSpreadsheet size={14} /> Importar pedido (Excel o PDF)
        </span>
        <p style={{ color: COLORS.muted }} className="text-xs mb-2">
          Sube un archivo con columnas de Código y Cantidad (o Metros) — se agregan automáticamente los productos
          reconocidos con el tipo de carga seleccionado arriba.
        </p>
        <div className="flex items-center gap-3">
          <input
            ref={importInputRef}
            type="file"
            accept=".xlsx,.xls,.csv,.pdf"
            onChange={handleImportarPedido}
            className="text-xs"
          />
        </div>
        {importMsg && (
          <p style={{ color: COLORS.text }} className="text-xs mt-2">
            {importMsg}

                    onClick={() => setModoExceso("consolidado")}
                    style={{
                      background: modoExceso === "consolidado" ? COLORS.navy : "#FFFFFF",
                      color: modoExceso === "consolidado" ? "#FFFFFF" : COLORS.text,
                      border: `1px solid ${COLORS.navy}`,
                    }}
                    className="rounded px-3 py-2 text-xs font-semibold flex-1 min-w-[160px]"
                  >
                    Consolidado
                    <span className="block font-normal" style={{ opacity: 0.8 }}>
                      {me && me.role === "admin"
                        ? `Cobra el ${remanentePct.toFixed(0)}% + recargo de ${fmtCLP(RECARGO_KM_CONSOLIDADO)}/km = ${fmtCLP(flete * (remanentePct / 100) + km_n * RECARGO_KM_CONSOLIDADO)}`
                        : `Cobra el ${remanentePct.toFixed(0)}% del tramo = ${fmtCLP(flete * (remanentePct / 100) + km_n * RECARGO_KM_CONSOLIDADO)}`}
                    </span>
                  </button>
                  <button
                    onClick={() => setModoExceso("full")}
                    style={{
                      background: modoExceso === "full" ? COLORS.navy : "#FFFFFF",
                      color: modoExceso === "full" ? "#FFFFFF" : COLORS.text,
                      border: `1px solid ${COLORS.navy}`,
                    }}
                    className="rounded px-3 py-2 text-xs font-semibold flex-1 min-w-[160px]"
                  >
                    Full
                    <span className="block font-normal" style={{ opacity: 0.8 }}>
                      Cobra el {truck.label} completo = {fmtCLP(flete)}
                    </span>
                  </button>
                </div>
              </>
            )}
            {(modoExceso || remanenteEsFull) && (
              <p style={{ color: COLORS.navy }} className="text-xs font-semibold mt-2">
                Flete total: {fmtCLP(flete)} (1er {truck.label})
                {camionesAdicionalesCompletos > 0 ? ` + ${fmtCLP(fleteCompletosAdicionales)} (adicionales llenos)` : ""}
                {` + ${fmtCLP(fleteUltimoAdicional)} (último, ${remanenteEsFull ? "full" : modoExceso}) = ${fmtCLP(fleteFinal)}`}
              </p>
            )}
          </div>
        )}
      </div>

      {requiereAutorizacionRampla && (
        <div style={{ background: "#FFF4F4", border: `1px solid ${COLORS.danger}` }} className="mt-3 mb-3 rounded-lg p-3 no-print">
          <p style={{ color: COLORS.danger }} className="text-xs flex items-center gap-1.5 font-semibold mb-1.5">
            <AlertTriangle size={13} /> Esta cotización requiere autorización del administrador
          </p>
          <p style={{ color: COLORS.text }} className="text-xs mb-2">
            Camión Rampla hacia {comunaInput} ({regionComuna}) sin que la carga supere la capacidad de un camión 3/4 ni incluya tira de 12mts.
          </p>
          {autorizacionAprobada ? (
            <p style={{ color: COLORS.navy }} className="text-xs font-semibold">
              Autorizado por {solicitudActual.resueltoPor} el {solicitudActual.resueltoFecha}. Ya puedes guardar el viaje.
            </p>
          ) : autorizacionPendiente ? (
            <p style={{ color: COLORS.muted }} className="text-xs">
              Solicitud enviada el {solicitudActual.fechaTexto}, esperando aprobación del administrador.
            </p>
          ) : (
            <>
              {solicitudActual && solicitudActual.estado === "rechazada" && (
                <p style={{ color: COLORS.danger }} className="text-xs mb-2">
                  Tu solicitud anterior fue rechazada por {solicitudActual.resueltoPor} el {solicitudActual.resueltoFecha}. Puedes volver a solicitar.
                </p>
              )}
              <button
                onClick={solicitarAutorizacion}
                style={{ background: COLORS.navy, color: "#FFFFFF" }}
                className="rounded px-3 py-2 text-xs font-semibold"
              >
                Solicitar autorización
              </button>
            </>
          )}
        </div>
      )}

      {editandoTrip && (
        <div style={{ background: "#FFF4D6", border: "1px solid #E3B341" }} className="rounded-lg px-4 py-2.5 mb-3 text-xs flex items-center justify-between flex-wrap gap-2 no-print">
          <span>
            <Pencil size={12} className="inline mb-0.5" /> Editando viaje de {editandoTrip.user} ({editandoTrip.fecha}) — al guardar se creará la <strong>versión {(editandoTrip.version || 1) + 1}</strong>, sin modificar el original.
          </span>
          <button onClick={nuevoViaje} style={{ color: COLORS.navy }} className="font-semibold hover:underline">
            Cancelar edición
          </button>
        </div>
      )}

      <div className="flex items-center gap-3 mb-6 no-print">
        <button
          onClick={saveTrip}
          disabled={items.length === 0 || necesitaDecision || bloqueadoPorAutorizacion}
          style={{ background: items.length > 0 && !necesitaDecision && !bloqueadoPorAutorizacion ? COLORS.navy : COLORS.border, color: "#FFFFFF" }}
          className="rounded-lg px-5 py-2.5 text-sm font-semibold disabled:cursor-not-allowed"
        >
          {editandoTrip ? "Guardar como nueva versión" : "Guardar viaje"}
        </button>
        {(items.length > 0 || comunaInput || editandoTrip) && (
          <button
            onClick={nuevoViaje}
            style={{ color: COLORS.muted, borderColor: COLORS.border }}
            className="rounded-lg px-4 py-2.5 text-sm font-semibold border"
          >
            Nuevo viaje
          </button>
        )}
        {savedMsg && <span style={{ color: COLORS.navy }} className="text-sm">{savedMsg}</span>}
        {necesitaDecision && (
          <span style={{ color: COLORS.danger }} className="text-xs">
            Define cómo cobrar el camión adicional antes de guardar.
          </span>
        )}
      </div>

      <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4">
        <div className="flex items-center justify-between flex-wrap gap-2 mb-3 no-print">
          <span style={{ color: COLORS.muted }} className="text-xs uppercase tracking-wide flex items-center gap-1.5">
            <History size={14} />{" "}
            {me && me.role === "admin"
              ? filtroUsuarioHistorial === "todos"
                ? "Historial de viajes (todos los usuarios)"
                : `Historial de viajes de ${filtroUsuarioHistorial}`
              : "Mi historial de viajes"}{" "}
            — exporta detalle por código, máx. 20
          </span>
          <div className="flex items-center gap-3">
            <input
              placeholder="Buscar por código, producto, comuna o usuario..."
              value={buscarHistorial}
              onChange={(e) => setBuscarHistorial(e.target.value)}
              style={inputStyle()}
              className="rounded px-2.5 py-1.5 text-xs outline-none w-64"
            />
            {me && me.role === "admin" && (
              <select
                value={filtroUsuarioHistorial}
                onChange={(e) => setFiltroUsuarioHistorial(e.target.value)}
                style={{ borderColor: COLORS.border, color: COLORS.navy }}
                className="rounded border px-2 py-1 text-xs"
              >
                <option value="todos">Todos los usuarios</option>
                {usuariosConViajes.map((u) => (
                  <option key={u} value={u}>
                    {u}
                  </option>
                ))}
              </select>
            )}
            <button
              onClick={() => exportarExcel(tripsFiltrados, cargaActualDetalle, cargaActualInfo)}
              disabled={tripsFiltrados.length === 0 && cargaActualDetalle.length === 0}
              style={{ color: COLORS.navy }}
              className="flex items-center gap-1 text-xs font-semibold disabled:opacity-40 hover:underline"
            >
              <FileSpreadsheet size={14} /> Excel
            </button>
            <button
              onClick={() => imprimirPDF("all")}
              disabled={tripsFiltrados.length === 0 && cargaActualDetalle.length === 0}
              style={{ color: COLORS.navy }}
              className="flex items-center gap-1 text-xs font-semibold disabled:opacity-40 hover:underline"
            >
              <FileText size={14} /> PDF
            </button>
            <button
              onClick={() => enviarPorCorreo(tripsFiltrados, cargaActualDetalle, cargaActualInfo)}
              disabled={tripsFiltrados.length === 0 && cargaActualDetalle.length === 0}
              style={{ color: COLORS.navy }}
              className="flex items-center gap-1 text-xs font-semibold disabled:opacity-40 hover:underline"
            >
              <Mail size={14} /> Correo
            </button>
          </div>
        </div>
        {tripsFiltrados.length === 0 ? (
          <p style={{ color: COLORS.muted }} className="text-sm">
            {tripsVisibles.length === 0 ? "Sin viajes registrados todavía." : "Ningún viaje de este usuario."}
          </p>
        ) : (
          <div className="space-y-2 max-h-64 overflow-y-auto no-print">
            {tripsFiltrados.map((t) => (
              <div
                key={t.id}
                style={{ background: COLORS.panel2, border: `1px solid ${COLORS.border}` }}
                className="rounded px-3 py-2 text-xs"
              >
                <div className="flex items-center justify-between">
                  <span>
                    <span className="font-semibold">{t.user}</span>
                    <span style={{ color: COLORS.muted }}> · {t.truck} · {t.fecha}</span>
                    {t.version > 1 && (
                      <span style={{ background: COLORS.navy, color: "#FFFFFF" }} className="ml-2 rounded-full px-1.5 py-0.5 text-[10px] font-semibold">
                        v{t.version}
                      </span>
                    )}
                  </span>
                  <span className="flex items-center gap-3" style={{ color: COLORS.muted }}>
                    <span>{t.pct}%</span>
                    <span style={{ color: COLORS.navy }}>{fmtCLP(t.flete)}</span>
                  </span>
                </div>
                {t.editadoDeId && (
                  <div style={{ color: COLORS.muted }} className="mt-0.5 italic">
                    Edición de un viaje anterior (versión {t.version - 1})
                  </div>
                )}
                {t.items && (
                  <div style={{ color: COLORS.muted }} className="mt-1">
                    {t.items.join(", ")}
                    {t.comuna ? ` → ${t.comuna}` : ""}
                    {t.pesoTotal ? ` · ${fmtKg(t.pesoTotal)}` : ""}
                  </div>
                )}
                {t.consolidado && (
                  <div style={{ color: "#9A6B00" }} className="mt-1 font-semibold">
                    Valor de carga Consolidada (Sujeto a consolidación de carga)
                  </div>
                )}
                <div className="flex items-center gap-3 mt-1.5">
                  {t.itemsRaw && t.itemsRaw.length > 0 && (
                    <button
                      onClick={() => editarViajeGuardado(t)}
                      style={{ color: COLORS.navy }}
                      className="flex items-center gap-1 text-xs font-semibold hover:underline"
                    >
                      <Pencil size={12} /> Editar
                    </button>
                  )}
                  <button
                    onClick={() => exportarExcel([t], [])}
                    style={{ color: COLORS.navy }}
                    className="flex items-center gap-1 text-xs font-semibold hover:underline"
                  >
                    <FileSpreadsheet size={12} /> Excel
                  </button>
                  <button
                    onClick={() => imprimirPDF(t.id)}
                    style={{ color: COLORS.navy }}
                    className="flex items-center gap-1 text-xs font-semibold hover:underline"
                  >
                    <FileText size={12} /> PDF
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Printable view: max 20 rows, simple table for PDF via window.print() */}
        <div className="print-only">
          <h2 style={{ color: COLORS.navy }}>
            {pdfTarget === "all" ? "Detalle de códigos calculados (todos los viajes)" : "Detalle de código calculado"}
          </h2>
          <table style={{ width: "100%", fontSize: 9, borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                <th style={{ textAlign: "left", padding: 3 }}>Código</th>
                <th style={{ textAlign: "left", padding: 3 }}>Producto</th>
                <th style={{ textAlign: "left", padding: 3 }}>Cantidad</th>
                <th style={{ textAlign: "left", padding: 3 }}>% Ítem</th>
                <th style={{ textAlign: "left", padding: 3 }}>Peso (kg)</th>
                <th style={{ textAlign: "left", padding: 3 }}>Destino</th>
                <th style={{ textAlign: "left", padding: 3 }}>Camión</th>
                <th style={{ textAlign: "left", padding: 3 }}>N° Camiones</th>
                <th style={{ textAlign: "left", padding: 3 }}>% Uso Total</th>
                <th style={{ textAlign: "left", padding: 3 }}>Flete</th>
                <th style={{ textAlign: "left", padding: 3 }}>Fecha / Usuario</th>
              </tr>
            </thead>
            <tbody>
              {filasParaImprimir.map((r, i) => (
                <tr key={i} style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                  <td style={{ padding: 3 }}>{r.codigo}</td>
                  <td style={{ padding: 3 }}>{r.desc}</td>
                  <td style={{ padding: 3 }}>{r.cantidad} {r.um}</td>
                  <td style={{ padding: 3 }}>{r.pct}%</td>
                  <td style={{ padding: 3 }}>{r.peso || "-"}</td>
                  <td style={{ padding: 3 }}>{r.destino}</td>
                  <td style={{ padding: 3 }}>{r.camion}</td>
                  <td style={{ padding: 3 }}>{r.camiones}</td>
                  <td style={{ padding: 3 }}>{r.pctUso !== "" ? `${r.pctUso}%` : "-"}</td>
                  <td style={{ padding: 3 }}>{r.fleteViaje !== "" ? fmtCLP(r.fleteViaje) : "-"}</td>
                  <td style={{ padding: 3 }}>{r.origen}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(CubicacionApp));
</script>
</body>
</html>
