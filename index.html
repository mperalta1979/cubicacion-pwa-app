    if (all === null) {
      try {
        return localStorage.getItem("cubicacion_" + key);
      } catch {
        return null;
      }
    }
    const v = all[key];
    return v === undefined ? null : JSON.stringify(v);
  }
  try {
    return localStorage.getItem("cubicacion_" + key);
  } catch {
    return null;
  }
}
async function storageSet(key, value, shared) {
  if (shared && JSONBIN_CONFIGURADO) {
    const all = (await remoteGetAll()) || {};
    try {
      all[key] = JSON.parse(value);
    } catch {
      all[key] = value;
    }
    const ok = await remoteSetAll(all);
    try {
      localStorage.setItem("cubicacion_" + key, value);
    } catch {
      /* ignore */
    }
    return ok;
  }
  try {
    localStorage.setItem("cubicacion_" + key, value);
  } catch {
    /* ignore */
  }
}

function randomSalt() {
  return Array.from(crypto.getRandomValues(new Uint8Array(8)))
    .map((b) => b.toString(16).padStart(2, "0"))
    .join("");
}
async function hashPassword(password, salt) {
  const enc = new TextEncoder().encode(salt + ":" + password);
  const digest = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(digest))
    .map((b) => b.toString(16).padStart(2, "0"))
    .join("");
}

function buscarFlete(comunaNombre, truckType, tabla) {
  const t = tabla || FLETES;
  if (!comunaNombre) return null;
  const tipoBuscado = truckType === "rampla" ? "rampla" : "3/4";
  const matches = t.filter((f) => f.comuna.toLowerCase() === comunaNombre.toLowerCase());
  if (matches.length === 0) return null;
  const exact = matches.find((f) => f.tipo === tipoBuscado);
  if (exact) return { km: exact.km, flete: exact.flete, region: exact.region, fuente: "tabla" };
  // La comuna existe en la tabla pero solo tiene tarifa registrada para el
  // otro tipo de camión. Se usa igualmente el flete FIJO de esa fila (no se
  // recalcula por km × tarifa genérica), ya que ese valor es el costo real
  // del trayecto y debe ser la base para aplicar % de uso + recargo.
  const other = matches[0];
  return { km: other.km, flete: other.flete, region: other.region, fuente: "tabla_otro_tipo" };
}
function regionDeComuna(comunaNombre, tabla) {
  const t = tabla || FLETES;
  if (!comunaNombre) return null;
  const m = t.find((f) => f.comuna.toLowerCase() === comunaNombre.toLowerCase());
  return m ? m.region : null;
}
function camionSugeridoPorRegion(region) {
  if (!region) return null;
  return REGIONES_34.includes(region) ? "3/4" : "rampla";
}
// Usa el tipo real registrado en la tabla de fletes para esa comuna (más
// preciso que la regla genérica por región, ya que la tabla puede tener
// excepciones puntuales como Limache, que va en 3/4 aunque sea V Región).
function camionSugeridoPorComuna(comunaNombre, region, tabla) {
  const t = tabla || FLETES;
  if (!comunaNombre) return null;
  const m = t.find((f) => f.comuna.toLowerCase() === comunaNombre.toLowerCase());
  if (m && m.tipo) return m.tipo;
  return camionSugeridoPorRegion(region);
}

// "Tuberia" en la base = viene en tiras. "Rollo" = viene en rollo.
function etiquetaFormato(formato) {
  return formato === "Rollo" ? "rollo" : "tira";
}
// Verifica que la cantidad ingresada (en metros) sea múltiplo exacto del
// largo de la tira/rollo (ej: tiras de 12m -> solo se pueden pedir 12, 24, 36...).
function evaluarCantidad(input) {
  if (input === null || input === undefined) return 0;
  const str = String(input).trim().replace(/,/g, ".");
  if (str === "") return 0;
  if (!/^[0-9+\-*/().\s]+$/.test(str)) {
    const n = parseFloat(str);
    return isNaN(n) ? 0 : n;
  }
  try {
    const resultado = Function(`"use strict"; return (${str});`)();
    return typeof resultado === "number" && isFinite(resultado) ? resultado : 0;
  } catch {
    return 0;
  }
}

function esMultiploValido(cantidad, largo) {
  if (!largo || largo <= 0) return true;
  if (!cantidad || cantidad <= 0) return true;
  const resto = cantidad % largo;
  const tolerancia = 0.001;
  return resto < tolerancia || largo - resto < tolerancia;
}
// Un producto va obligatoriamente en Rampla si no tiene equivalencia en 3/4,
// o si es una TIRA (no rollo) y su largo supera los 6 metros. Los rollos se
// pueden cargar en 3/4 y Rampla aunque su largo nominal supere los 6m.
function soloRampla(p) {
  if (p.mtsCamion34 === null) return true;
  if (p.formato === "Rollo") return false;
  return parseFloat(p.largo) > 6;
}
function motivoSoloRampla(p) {
  if (p.mtsCamion34 === null) {
    return `${p.codigo} viene en ${etiquetaFormato(p.formato)} de ${fmtMts(p.largo)}: solo se carga en Rampla.`;
  }
  return `${p.codigo} viene en tira de ${fmtMts(p.largo)}: al superar los 6m, solo se puede cargar en Rampla.`;
}

// ===================== MÓDULO DE EMBOQUILLADO (telescopiado) =====================
// Tabla de empaquetado circular (circle packing in circle): razón mínima
// D_host/D_objeto necesaria para que quepan N círculos chicos dentro de uno grande.
const PACKING_TABLE = [
  [1, 1.0], [2, 2.0], [3, 2.1547], [4, 2.4142], [5, 2.7013],
  [6, 3.0], [7, 3.0], [8, 3.3032], [9, 3.6131], [10, 3.813],
  [11, 3.9238], [12, 4.0296], [13, 4.2361], [14, 4.3284], [15, 4.5214],
  [16, 4.6154], [17, 4.792], [18, 4.8637], [19, 4.8637], [20, 5.1223],
];
const HOLGURA_EMBOQUILLADO = 0.9; // 10% de holgura/prudencia

function materialDe(desc) {
  const d = (desc || "").toUpperCase();
  if (d.includes("PETROPIPE")) return "PETROPIPE";
  if (d.includes("HDPE")) return "HDPE";
  if (d.includes("PVC")) return "PVC";
  return "OTRO";
}
// HDPE requiere aprobación del Admin para poder emboquillarse.
function requiereAprobacionEmboquillado(it) {
  return materialDe(it.desc) === "HDPE";
}

function nTeoricoEmboquillado(dHost, dObjeto) {
  if (!dHost || !dObjeto || dObjeto <= 0) return 1;
  const ratio = dHost / dObjeto;
  let n = 1;
  for (const [cand, minRatio] of PACKING_TABLE) {
    if (ratio >= minRatio) n = cand;
  }
  return n;
}
function capacidadEmboquillado(dHost, dObjeto) {
  const nt = nTeoricoEmboquillado(dHost, dObjeto);
  return Math.max(1, Math.floor(nt * HOLGURA_EMBOQUILLADO));
}

// Recibe lista de { diam, cantidad } de productos marcados como "Emboquillado",
// agrupados por diámetro (sumando tiras de igual diámetro). Devuelve
// { bultosFinales, granelResultante } donde cada bulto final es la unidad que
// realmente ocupa espacio en el camión, ya con todo anidado. Prioridad: a cada
// diámetro anfitrión, se atienden primero los objetos en espera de MAYOR
// diámetro (más grandes), luego los más chicos.
function calcularEmboquillado(gruposPorDiametro) {
  const porDiam = {};
  gruposPorDiametro.forEach((g) => {
    porDiam[g.diam] = (porDiam[g.diam] || 0) + g.cantidad;
  });
  const diamsOrdenados = Object.keys(porDiam).map(Number).sort((a, b) => a - b);

  let pendientes = []; // [{diam, cantidad}] esperando host, se prioriza mayor diam primero
  const bultosFinales = []; // unidades que NO se vuelven a anidar en nada mayor (ocupan espacio real)
  const historial = []; // registro de TODAS las etapas (incluye intermedias) para mostrar el detalle al usuario

  diamsOrdenados.forEach((d, idx) => {
    const esUltimo = idx === diamsOrdenados.length - 1;
    let hostsDisponibles = porDiam[d];
    const contenido = [];

    pendientes.sort((a, b) => b.diam - a.diam);
    const nuevosPendientes = [];
    for (const obj of pendientes) {
      if (hostsDisponibles <= 0) {
        nuevosPendientes.push(obj);
        continue;
      }
      const cap = capacidadEmboquillado(d, obj.diam);
      const hostsNecesarios = Math.ceil(obj.cantidad / cap);
      const hostsUsar = Math.min(hostsNecesarios, hostsDisponibles);
      const colocados = Math.min(obj.cantidad, hostsUsar * cap);
      hostsDisponibles -= hostsUsar;
      const restante = obj.cantidad - colocados;
      if (colocados > 0) {
        contenido.push({ diam: obj.diam, cantidad: colocados, hosts: hostsUsar, cap });
        historial.push({ diamExterior: d, contenidoDiam: obj.diam, hostsUsados: hostsUsar, cantidadContenida: colocados });
      }
      if (restante > 0) nuevosPendientes.push({ diam: obj.diam, cantidad: restante });
    }
    pendientes = nuevosPendientes;

    const hostsUsadosTotal = contenido.reduce((s, c) => s + c.hosts, 0);
    const hostsLibres = porDiam[d] - hostsUsadosTotal;

    if (esUltimo) {
      contenido.forEach((c) => {
        bultosFinales.push({ diamExterior: d, contenidoDiam: c.diam, cantidadContenida: c.cantidad, bultos: c.hosts });
      });
      if (hostsLibres > 0) {
        bultosFinales.push({ diamExterior: d, contenidoDiam: null, cantidadContenida: 0, bultos: hostsLibres, vacio: true });
      }
    } else {
      pendientes.push({ diam: d, cantidad: porDiam[d] });
    }
  });

  const granelResultante = pendientes.filter((p) => p.cantidad > 0);

  return { bultosFinales, granelResultante, historial };
}

function detalleParaExportar(trips, cargaActual) {
  const rows = [];
  if (cargaActual && cargaActual.length > 0) {
    cargaActual.forEach((it) => rows.push({ ...it, origen: "Carga actual (sin guardar)" }));
  }
  for (const t of trips) {
    if (rows.length >= 20) break;
    const det = t.detalle || [];
    for (const d of det) {
      if (rows.length >= 20) break;
      rows.push({ ...d, origen: `${t.fecha} · ${t.user} · ${t.truck}` });
    }
  }
  return rows.slice(0, 20);
}

function exportarExcel(trips, cargaActual) {
  const rows = detalleParaExportar(trips, cargaActual).map((r) => ({
    Origen: r.origen,
    Código: r.codigo,
    Producto: r.desc,
    Cantidad: r.cantidad,
    "UM / Medidas": r.um,
    "% Camión": r.pct,
    "Peso (kg)": r.peso,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Detalle codigos");
  XLSX.writeFile(wb, "detalle_codigos_cubicacion.xlsx");
}

}

function enviarPorCorreo(trips, cargaActual) {
  const rows = detalleParaExportar(trips, cargaActual);
  const lines = rows.map(
    (r) => `${r.codigo} - ${r.desc} - ${r.cantidad} ${r.um} - ${r.pct}% - ${r.origen}`
  );
  const body = encodeURIComponent(
    "Detalle de códigos calculados (máx. 20):\n\n" + lines.join("\n")
  );
  const subject = encodeURIComponent("Detalle de códigos - Cubicación");
  const a = document.createElement("a");
  a.href = `mailto:?subject=${subject}&body=${body}`;
  a.target = "_blank";
  a.rel = "noopener noreferrer";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

    () =>

        it.tipo === "catalogo"
          ? {
              codigo: it.codigo,
              desc: it.desc,
              cantidad: it.cantidad,
              um: "m",
              pct: Math.round(it.frac * 1000) / 10,
              peso: it.pesoTotal ? Math.round(it.pesoTotal * 100) / 100 : "",
            }
          : {
              codigo: "Manual",
              desc: it.nombre || "Manual",
              cantidad: it.qty,
              um: `${it.largo}×${it.ancho}×${it.alto}cm`,
              pct: Math.round(it.frac * 1000) / 10,
              peso: "",
            }
      ),
    [fracciones]
  );
  const overCapacity = pct > 100;
  const pesoTotalCarga = fracciones.reduce((s, it) => s + (it.pesoTotal || 0), 0);
  let barColor = COLORS.celeste;
  if (pct > 95) barColor = COLORS.danger;
  else if (pct > 75) barColor = COLORS.navy;
  const filasParaImprimir =
    pdfTarget === "all"
      ? detalleParaExportar(tripsVisibles, cargaActualDetalle)
      : pdfTarget
      ? detalleParaExportar(tripsVisibles.filter((t) => t.id === pdfTarget), [])
      : [];

  const fleteInfo = buscarFlete(comunaInput, truckType, fletesActivo);
  const km_n = fleteInfo ? fleteInfo.km : parseFloat(kmManual) || 0;
  const flete = fleteInfo ? fleteInfo.flete : km_n * truck.tarifaKm;
  // El flete solo debe mostrarse cuando el usuario completó todos los campos
  // requeridos: comuna encontrada en la tabla (con tarifa fija, aunque su km
  // registrado sea 0, como ocurre en comunas urbanas RM) o km manual válido
  // si la comuna no está en la tabla, y al menos un producto agregado.
  const camposFleteCompletos =
    !!comunaInput.trim() &&
    (!!fleteInfo || (parseFloat(kmManual) || 0) > 0) &&
    items.length > 0;
  const regionComuna = regionDeComuna(comunaInput, fletesActivo);
  const camionSugerido = camionSugeridoPorComuna(comunaInput, regionComuna, fletesActivo);

  // Excepciones a la autorización: tira de 12mts en la carga, o la carga
  // realmente excede la capacidad de un camión 3/4 (independiente del
  // camión seleccionado).
  const tiene12m = items.some(
    (it) => it.tipo === "catalogo" && it.formato === "Tuberia" && parseFloat(it.largo) === 12
  );
  const pctEn34 = items.reduce((s, it) => {
    if (it.tipo === "catalogo") {
      const cap = it.mtsCamion34;
      if (!cap || cap <= 0) return s + 100; // no cabe en 3/4 a ningún nivel: cuenta como excedido
      return s + (it.cantidad / cap) * 100;
    }
    const l = parseFloat(it.largo) || 0;
    const a = parseFloat(it.ancho) || 0;
    const h = parseFloat(it.alto) || 0;
    const q = parseInt(it.qty) || 0;
    const volumen = (l * a * h * q) / 1e6;
    return s + (TRUCKS["3/4"].capacidad > 0 ? (volumen / TRUCKS["3/4"].capacidad) * 100 : 0);
  }, 0);
  const excedeCapacidad34 = pctEn34 > 100;
  const esSantiagoASeptima = regionComuna === "VII Maule";
  const requiereAutorizacionRampla =
    !!me && me.role !== "admin" && truckType === "rampla" && esSantiagoASeptima && !tiene12m && !excedeCapacidad34 && items.length > 0;
  const solicitudActual = requiereAutorizacionRampla
    ? authRequests
        .filter((r) => r.user === session && r.comuna === comunaInput && r.truck === "rampla")
        .sort((a, b) => b.fecha - a.fecha)[0] || null
    : null;
  const autorizacionPendiente = requiereAutorizacionRampla && solicitudActual && solicitudActual.estado === "pendiente";
  const autorizacionAprobada = requiereAutorizacionRampla && solicitudActual && solicitudActual.estado === "aprobada";
  const bloqueadoPorAutorizacion = requiereAutorizacionRampla && !autorizacionAprobada;

  // Piso mínimo de flete y recargo por km en carga consolidada.
  const FLETE_MINIMO = 70000;
  const ES_LOS_LAGOS = regionComuna === "X Los Lagos";
  const RECARGO_KM_CONSOLIDADO = ES_LOS_LAGOS ? 100 : 200;

  // Se cobra proporcional al porcentaje real usado. A partir del 90% de uso
  // se cobra como si fuera el 100% (flete full, sin recargo).
  const pctCobrado = pct > 0 ? (pct >= 90 ? 100 : Math.min(100, pct)) : 0;
  const primerCamionEsConsolidado = pct > 0 && pct <= 100 && pctCobrado < 100;
  const recargoPrimerCamion = primerCamionEsConsolidado ? km_n * RECARGO_KM_CONSOLIDADO : 0;
  const fleteProporcional = flete * (pctCobrado / 100) + recargoPrimerCamion;

  // Camiones adicionales necesarios cuando la carga excede el 100%.
  const totalCamiones = pct > 100 ? Math.ceil(pct / 100) : 1;
  const camionesAdicionales = totalCamiones - 1; // cuántos camiones extra se necesitan
  const camionesAdicionalesCompletos = Math.max(0, camionesAdicionales - 1); // van 100% llenos
  const remanentePct = pct - (totalCamiones - 1) * 100; // % de llenado del último camión extra
  const remanenteEsFull = remanentePct >= 90; // desde 90% de uso se cobra full automáticamente
  const necesitaDecision = camionesAdicionales > 0 && !modoExceso && !remanenteEsFull;
  const fleteCompletosAdicionales = camionesAdicionalesCompletos * flete;
  const ultimoAdicionalEsConsolidado = camionesAdicionales > 0 && modoExceso !== "full" && !remanenteEsFull;
  const fleteUltimoAdicional =
    camionesAdicionales > 0
      ? modoExceso === "full" || remanenteEsFull
        ? flete
        : flete * (remanentePct / 100) + km_n * RECARGO_KM_CONSOLIDADO
      : 0;
  const fleteAdicionalTotal =
    camionesAdicionales > 0 && (modoExceso || remanenteEsFull) ? fleteCompletosAdicionales + fleteUltimoAdicional : 0;
  const fleteFinalCrudo = (pct > 100 ? flete : fleteProporcional) + fleteAdicionalTotal;
  const pisoAplicado = fleteFinalCrudo > 0 && fleteFinalCrudo < FLETE_MINIMO;
  let fleteFinal = pisoAplicado ? FLETE_MINIMO : fleteFinalCrudo;

  function handleCatalogoExcelFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 6, defval: null });
        // Detecta encabezados reales (fila 7 en el Excel original = header index 6)
        let dataRows = XLSX.utils.sheet_to_json(ws, { defval: null });
        if (dataRows.length === 0 || !("Codigo" in dataRows[0])) {
          dataRows = XLSX.utils.sheet_to_json(ws, { range: 0, defval: null });
        }
        let added = 0;
        let skipped = 0;
        const nuevos = [];
        for (const row of dataRows) {
          const codigo = row.Codigo ?? row.codigo ?? row.CODIGO;
          const mtsRampla = row.MtsXrampla ?? row.mtsRampla ?? row["Mts x Rampla"];
          if (!codigo || mtsRampla === null || mtsRampla === undefined) {
            skipped++;
            continue;
          }
          const um = String(row.UM ?? row.um ?? "MT");
          const largo = parseFloat(row.LARGO ?? row.largo ?? row.Largo ?? 0) || null;
          const pesoRaw = row.Peso ?? row.peso ?? null;
          const formato = row.Formato ?? row.formato ?? "Tuberia";
          let pesoPorMetro = null;
          if (pesoRaw !== null && largo) {
            pesoPorMetro = um === "TR" ? Number(pesoRaw) / largo : Number(pesoRaw);
          }
          nuevos.push({
            codigo: String(codigo),
            desc: String(row.Descripcion ?? row.descripcion ?? ""),
            um,
            formato,
            diam: row.DIAM ?? row.diam ?? null,
            largo,
            peso: pesoRaw,
            pesoPorMetro,
            rollosRampla: row.RollosXrampla ?? row.rollosRampla ?? null,
            mtsRampla: Number(mtsRampla),
            mtsCamion34: row["MtsXcamion 3/4"] ?? row.mtsCamion34 ?? null,
          });
          added++;
        }
        const next = [...catalogoExtra.filter((e) => !nuevos.find((n) => n.codigo === e.codigo)), ...nuevos];
        persistCatalogoExtra(next);
        setCatAdminMsg(`Excel cargado: ${added} productos agregados/actualizados, ${skipped} filas omitidas.`);
      } catch (err) {
        setCatAdminMsg("No se pudo leer el archivo. Verifica que sea el formato esperado (Codigo, Descripcion, UM, DIAM, LARGO, Peso, RollosXrampla, MtsXrampla, MtsXcamion 3/4, Formato).");
      }
      if (fileInputRef.current) fileInputRef.current.value = "";
    };
    reader.readAsBinaryString(file);
  }

  function buscarProductoPorCodigo(codigoRaw) {
    const norm = (s) => String(s ?? "").trim().toUpperCase().replace(/\s+/g, "");
    const codigo = norm(codigoRaw);
    if (!codigo) return null;
    let p = catalogoActivo.find((x) => norm(x.codigo) === codigo);
    if (p) return p;
    const base = codigo.split("-")[0];
    p = catalogoActivo.find((x) => norm(x.codigo).split("-")[0] === base);
    return p || null;
  }

  function handleImportarPedidoExcel(file) {
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        let agregados = 0;
        const noEncontrados = [];
        let encontroTabla = false;

        for (const sheetName of wb.SheetNames) {
          const ws = wb.Sheets[sheetName];
          const filas = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

          let headerRowIdx = -1;
          let colCodigo = -1;
          let colCantidad = -1;
          for (let i = 0; i < filas.length; i++) {
            const fila = filas[i];
            if (!Array.isArray(fila)) continue;
            let cIdx = -1;
            let qIdx = -1;
            fila.forEach((cell, idx) => {
              const t = String(cell ?? "").trim().toLowerCase();
              if (/^c[oó]digo$/.test(t)) cIdx = idx;
              if (/^cantidad$|^metros$|^mts$/.test(t)) qIdx = idx;
            });
            if (cIdx >= 0 && qIdx >= 0) {
              headerRowIdx = i;
              colCodigo = cIdx;
              colCantidad = qIdx;
              break;
            }
          }
          if (headerRowIdx === -1) continue;

          encontroTabla = true;
          for (let i = headerRowIdx + 1; i < filas.length; i++) {
            const fila = filas[i];
            if (!Array.isArray(fila)) continue;
            const codigo = fila[colCodigo];
            const cantidadRaw = fila[colCantidad];
            if (!codigo) continue;
            const cantidad = evaluarCantidad(cantidadRaw);
            if (cantidad <= 0) continue;
            const producto = buscarProductoPorCodigo(codigo);
            if (!producto) {
              noEncontrados.push(String(codigo));
              continue;
            }
            agregarItemDesdeProducto(producto, cantidad);
            agregados++;
          }
          break;
        }

        if (!encontroTabla) {
          setImportMsg(
            "No se encontraron columnas 'Código' y 'Cantidad' (o 'Metros'/'Mts') en ninguna hoja del archivo. Revisa el formato."
          );
        } else {
          setImportMsg(
            `Importación Excel: ${agregados} producto(s) agregados.` +
              (noEncontrados.length > 0 ? ` ${noEncontrados.length} código(s) no reconocidos: ${noEncontrados.join(", ")}.` : "")
          );
        }
      } catch (err) {
        setImportMsg("No se pudo leer el Excel. Verifica que tenga columnas de Código y Cantidad/Metros.");
      }
      if (importInputRef.current) importInputRef.current.value = "";
    };
    reader.readAsBinaryString(file);
  }

  // Lectura de PDF: extrae todo el texto del documento y busca, token por
  // token, coincidencias con códigos reales del catálogo activo; el primer
  // número válido que aparece después del código se toma como cantidad.
  // Es un método heurístico (depende de cómo esté armado el PDF), funciona
  // mejor con PDFs tabulares simples (código, descripción, cantidad).
  async function handleImportarPedidoPDF(file) {
    try {
      if (window.pdfjsLib && !pdfjsLib.GlobalWorkerOptions.workerSrc) {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let textoCompleto = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        textoCompleto += " " + content.items.map((it) => it.str).join(" ");
      }
      const tokens = textoCompleto.split(/\s+/).filter(Boolean);
      const codigosSet = new Set(catalogoActivo.map((p) => String(p.codigo).trim().toUpperCase()));
      let agregados = 0;
      const vistos = new Set();
      for (let i = 0; i < tokens.length; i++) {
        const tok = tokens[i].toUpperCase();
        if (!codigosSet.has(tok) || vistos.has(tok)) continue;
        // busca el primer numero valido (>0) en los siguientes 6 tokens
        for (let j = i + 1; j < Math.min(i + 7, tokens.length); j++) {
          const cand = tokens[j].replace(/\./g, "").replace(",", ".");
          const cantidad = evaluarCantidad(cand);
          if (cantidad > 0) {
            const producto = buscarProductoPorCodigo(tok);
            if (producto) {
              agregarItemDesdeProducto(producto, cantidad);
              agregados++;
              vistos.add(tok);
            }
            break;
          }
        }
      }
      setImportMsg(
        agregados > 0
          ? `Importación PDF: ${agregados} producto(s) agregados (revisa las cantidades, la lectura de PDF es aproximada).`
          : "No se reconocieron códigos de catálogo en el PDF. Prueba con un Excel para mayor precisión."
      );
    } catch (err) {
      setImportMsg("No se pudo leer el PDF. Prueba con un archivo Excel.");
    }

  function handleImportarPedido(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImportMsg("Procesando archivo...");
    if (/\.(xlsx|xls|csv)$/i.test(file.name)) {
      handleImportarPedidoExcel(file);
    } else if (/\.pdf$/i.test(file.name)) {
      handleImportarPedidoPDF(file);
    } else {
      setImportMsg("Formato no soportado. Sube un archivo Excel (.xlsx/.xls/.csv) o PDF.");
      if (importInputRef.current) importInputRef.current.value = "";
    }

            return it;

          return { ...it, cantidad };
        }
        return {
          ...it,
          nombre: editValues.nombre,
          largo: editValues.largo,
          ancho: editValues.ancho,
          alto: editValues.alto,
          qty: editValues.qty,

    setEditingId(null);

  async function saveTrip() {
    if (items.length === 0) return;
    if (necesitaDecision) return; // falta decidir consolidado/full
    if (bloqueadoPorAutorizacion) return; // requiere autorización del admin
    const fecha = new Date().toLocaleString("es-CL");
    const detalle = fracciones.map((it) =>
      it.tipo === "catalogo"
        ? {
            codigo: it.codigo,
            desc: it.desc,
            cantidad: it.cantidad,
            um: "m",
            pct: Math.round(it.frac * 1000) / 10,
            peso: it.pesoTotal ? Math.round(it.pesoTotal * 100) / 100 : "",
          }
        : {
            codigo: "Manual",
            desc: it.nombre || "Manual",
            cantidad: it.qty,
            um: `${it.largo}×${it.ancho}×${it.alto}cm`,
            pct: Math.round(it.frac * 1000) / 10,
            peso: "",
          }
    );
    const record = {
      id: Date.now(),
      user: session,
      truck: truck.label,
      items: items.map((it) =>
        it.tipo === "catalogo" ? `${it.codigo} (${it.cantidad} m)` : `${it.nombre || "Manual"} x${it.qty}`
      ),
      detalle,
      pct: Math.round(pct),
      pesoTotal: pesoTotalCarga,
      comuna: comunaInput || null,
      km: km_n,
      flete: fleteFinal,
      consolidado: pct > 0 && pct < 90,
      camionesAdicionales,
      modoExceso,
      fecha,
    };
    const next = [record, ...trips].slice(0, 50);
    setTrips(next);
    await storageSet("trips", JSON.stringify(next), true);

    const aviso = {
      id: Date.now() + 1,
      user: session,
      fecha,
      resumen: `${session} guardó un cálculo: ${record.items.length} producto(s), ${truck.label}, ${Math.round(pct)}% usado${comunaInput ? `, destino ${comunaInput}` : ""}.`,
      leido: false,
    };
    const avisosActuales = await storageGet("avisos", true);
    let listaAvisos = [];
    try {
      listaAvisos = avisosActuales ? JSON.parse(avisosActuales) : [];
    } catch {
      listaAvisos = [];
    }
    const nextAvisos = [aviso, ...listaAvisos].slice(0, 100);
    setAvisos(nextAvisos);
    await storageSet("avisos", JSON.stringify(nextAvisos), true);

    setItems([]);
    setSavedMsg("Viaje guardado");
    setTimeout(() => setSavedMsg(""), 2500);
  }

  async function solicitarAprobacionHDPE(it) {
    const actuales = await storageGet("aprobacionesHDPE", true);
    let lista = [];
    try {
      lista = actuales ? JSON.parse(actuales) : [];
    } catch {
      lista = [];
    }
    const yaExiste = lista.find(
      (s) => s.user === session && s.codigo === it.codigo && s.estado === "pendiente"
    );
    if (yaExiste) return;
    const solicitud = {
      id: Date.now(),
      user: session,
      codigo: it.codigo,
      desc: it.desc,
      diam: it.diam,
      cantidad: it.cantidad,
      estado: "pendiente",
      fecha: new Date().toLocaleString("es-CL"),
    };
    const next = [solicitud, ...lista].slice(0, 100);
    setAprobacionesHDPE(next);
    await storageSet("aprobacionesHDPE", JSON.stringify(next), true);

    const aviso = {
      id: Date.now() + 2,
      user: session,
      fecha: solicitud.fecha,
      resumen: `${session} solicita aprobación para emboquillar HDPE: ${it.codigo} — ${it.desc}.`,
      leido: false,
      esAprobacionHDPE: true,
    };
    const avisosActuales = await storageGet("avisos", true);
    let listaAvisos = [];
    try {
      listaAvisos = avisosActuales ? JSON.parse(avisosActuales) : [];
    } catch {
      listaAvisos = [];
    }
    const nextAvisos = [aviso, ...listaAvisos].slice(0, 100);
    setAvisos(nextAvisos);
    await storageSet("avisos", JSON.stringify(nextAvisos), true);
  }

  async function resolverAprobacionHDPE(id, aprobar) {
    const next = aprobacionesHDPE.map((s) =>
      s.id === id ? { ...s, estado: aprobar ? "aprobado" : "rechazado" } : s
    );
    setAprobacionesHDPE(next);
    await storageSet("aprobacionesHDPE", JSON.stringify(next), true);
  }

  async function refrescarMisAprobaciones() {
    const actuales = await storageGet("aprobacionesHDPE", true);
    let lista = [];
    try {
      lista = actuales ? JSON.parse(actuales) : [];
    } catch {
      lista = [];
    }
    setAprobacionesHDPE(lista);
    setItems((prev) =>
      prev.map((it) => {
        if (it.tipoCarga !== "Emboquillado") return it;
        if (materialDe(it.desc) !== "HDPE" || it.emboquilladoAprobado) return it;
        const aprobada = lista.find(
          (s) => s.user === session && s.codigo === it.codigo && s.estado === "aprobado"
        );
        return aprobada ? { ...it, emboquilladoAprobado: true } : it;
      })
    );
  }


  async function handleAddUser() {
    setAdminMsg("");
    const uname = newUser.username.trim();
    const pass = newUser.password;
    if (!uname || !pass) {
      setAdminMsg("Completa usuario y clave.");
      return;
    }
    if (!ALNUM_RE.test(pass) || pass.length < 6) {
      setAdminMsg("La clave debe ser alfanumérica (solo letras y números) y de al menos 6 caracteres.");
      return;
    }
    if (users.find((u) => u.username.toLowerCase() === uname.toLowerCase())) {
      setAdminMsg("Ese usuario ya existe.");
      return;
    }
    const salt = randomSalt();
    const hash = await hashPassword(pass, salt);
    const next = [...users, { username: uname, salt, hash, role: newUser.role, blocked: false }];
    await persistUsers(next);
    setNewUser({ username: "", password: "", role: "user" });
    setAdminMsg("Usuario creado.");
  }

  async function toggleBlock(username) {
    if (username === session) return;
    const next = users.map((u) => (u.username === username ? { ...u, blocked: !u.blocked } : u));
    await persistUsers(next);

  async function toggleRole(username) {
    if (username === session) return;
    const next = users.map((u) =>
      u.username === username ? { ...u, role: u.role === "admin" ? "user" : "admin" } : u
    );
    await persistUsers(next);

  async function adminResetPassword(username) {
    const tempPass = "Temp" + Math.floor(1000 + Math.random() * 9000);
    const salt = randomSalt();
    const hash = await hashPassword(tempPass, salt);
    const next = users.map((u) => (u.username === username ? { ...u, salt, hash } : u));
    await persistUsers(next);
    setAdminMsg(`Clave temporal para ${username}: ${tempPass} (compártela de forma segura)`);
  }
  async function deleteUser(username) {
    if (username === session) return;
    const next = users.filter((u) => u.username !== username);
    await persistUsers(next);
  }

  async function handleChangePassword() {
    setPwMsg("");
    if (!pwForm.actual || !pwForm.nueva || !pwForm.confirmar) {
      setPwMsg("Completa todos los campos.");
      return;
    }
    const hashActual = await hashPassword(pwForm.actual, me.salt);
    if (hashActual !== me.hash) {
      setPwMsg("La clave actual no es correcta.");
      return;
    }
    if (!ALNUM_RE.test(pwForm.nueva) || pwForm.nueva.length < 6) {
      setPwMsg("La nueva clave debe ser alfanumérica y de al menos 6 caracteres.");
      return;
    }
    if (pwForm.nueva !== pwForm.confirmar) {
      setPwMsg("Las claves nuevas no coinciden.");
      return;
    }
    const salt = randomSalt();
    const hash = await hashPassword(pwForm.nueva, salt);
    const next = users.map((u) => (u.username === session ? { ...u, salt, hash } : u));
    await persistUsers(next);
    setPwForm({ actual: "", nueva: "", confirmar: "" });
    setPwMsg("Clave actualizada correctamente.");
  }

          <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="mt-3 rounded-lg p-3 text-xs no-print">
            <p style={{ color: COLORS.navy }} className="font-semibold mb-1.5 flex items-center gap-1.5">
              <Route size={12} /> Desglose del cálculo (solo admin)
            </p>
            <div style={{ color: COLORS.text }} className="space-y-0.5">
              <div>Flete base ({truck.label}, {km_n} km): {fmtCLP(flete)}</div>
              <div>Región: {regionComuna || "-"} {ES_LOS_LAGOS ? "(Los Lagos)" : ""}</div>
              <div>
                Tramo 1er camión: {fmtCLP(flete * (pctCobrado / 100))}
                {primerCamionEsConsolidado && ` + recargo consolidado ${fmtCLP(RECARGO_KM_CONSOLIDADO)}/km × ${km_n}km = ${fmtCLP(recargoPrimerCamion)}`}
                {` = ${fmtCLP(fleteProporcional)}`}
              </div>
              {camionesAdicionales > 0 && (
                <>
                  <div>Camiones adicionales: {camionesAdicionales} ({camionesAdicionalesCompletos} lleno{camionesAdicionalesCompletos !== 1 ? "s" : ""} + 1 con {remanentePct.toFixed(1)}%{remanenteEsFull ? " → ≥90% se cobra full" : ""})</div>
                  {camionesAdicionalesCompletos > 0 && <div>Adicionales llenos: {camionesAdicionalesCompletos} × {fmtCLP(flete)} = {fmtCLP(fleteCompletosAdicionales)}</div>}
                  <div>Último adicional ({remanenteEsFull ? "full" : modoExceso || "pendiente"}): {fmtCLP(fleteUltimoAdicional)}</div>
                </>
              )}
              <div>Subtotal antes de piso: {fmtCLP(fleteFinalCrudo)}</div>
              {pisoAplicado && <div style={{ color: COLORS.danger }}>Piso mínimo aplicado (subtotal &lt; {fmtCLP(FLETE_MINIMO)}): se cobra {fmtCLP(FLETE_MINIMO)}</div>}
              <div className="font-semibold mt-1">Total cobrado: {fmtCLP(fleteFinal)}</div>
            </div>
          </div>
        )}
        {regionComuna && camionSugerido && camionSugerido !== truckType && !truckLockNote && !regionConfirmado && (
          <div
            style={{ background: "#FFF4D6", border: `1px solid #E3B341` }}
            className="mt-3 rounded px-3 py-2.5 text-xs"
          >
            <div className="flex items-start gap-1.5 mb-2" style={{ color: "#5A4400" }}>
              <AlertTriangle size={13} style={{ marginTop: 2, flexShrink: 0 }} />
              <p className="leading-relaxed">
                Usted indica comuna de <b>{comunaInput}</b> ({regionComuna}) y está seleccionando{" "}
                <b>{truck.label}</b>. Hasta la Séptima Región habitualmente se va en <b>3/4</b>, y más
                al sur en <b>Rampla</b>. ¿Está seguro de que desea considerar {truck.label}?
              </p>
            </div>
            <div className="flex flex-wrap gap-2">
              <button
                onClick={aplicarSugerenciaCamion}
                style={{ background: COLORS.navy, color: "#FFFFFF" }}
                className="rounded px-3 py-1.5 font-semibold"
              >
                No, usar {TRUCKS[camionSugerido].label}
              </button>
              <button
                onClick={() => setRegionConfirmado(true)}
                style={{ background: "#FFFFFF", border: `1px solid ${COLORS.navy}`, color: COLORS.navy }}
                className="rounded px-3 py-1.5 font-semibold"
              >
                Sí, mantener {truck.label}
              </button>
            </div>
          </div>
        )}

        {camionesAdicionales > 0 && (
          <div style={{ background: "#FFF4F4", border: `1px solid ${COLORS.danger}` }} className="mt-3 rounded-lg p-3">
            <p style={{ color: COLORS.danger }} className="text-xs flex items-center gap-1.5 font-semibold mb-2">
              <AlertTriangle size={13} />
              La carga excede la capacidad de {totalCamiones === 2 ? "un" : totalCamiones - 1} {truck.label}
              {camionesAdicionalesCompletos > 0 ? `(${camionesAdicionalesCompletos} lleno${camionesAdicionalesCompletos > 1 ? "s" : ""} + ` : " en "}
              {remanentePct.toFixed(0)}%{camionesAdicionalesCompletos > 0 ? ")" : " adicional"} — necesitas {camionesAdicionales} {camionesAdicionales > 1 ? `${truck.label}s adicionales` : `${truck.label} adicional`}.
            </p>

            {camionesAdicionalesCompletos > 0 && (
              <p style={{ color: COLORS.muted }} className="text-xs mb-2">
                {camionesAdicionalesCompletos} {truck.label} adicional{camionesAdicionalesCompletos > 1 ? "es" : ""} 100% lleno{camionesAdicionalesCompletos > 1 ? "s" : ""}: se cobra completo ×{camionesAdicionalesCompletos} = {fmtCLP(fleteCompletosAdicionales)}.
              </p>
            )}

            {remanenteEsFull ? (
              <p style={{ color: COLORS.text }} className="text-xs mb-2">
                El último {truck.label} adicional queda con un {remanentePct.toFixed(0)}% de carga (≥90%), por lo que se cobra automáticamente como flete completo = {fmtCLP(flete)}.
              </p>
            ) : (
              <>
                <p style={{ color: COLORS.text }} className="text-xs mb-2">
                  El último {truck.label} adicional queda con un {remanentePct.toFixed(0)}% de carga. ¿Cómo se cobra ese tramo?
                </p>
                <div className="flex flex-wrap gap-2">
                  <button
                    onClick={() => setModoExceso("consolidado")}
                    style={{
                      background: modoExceso === "consolidado" ? COLORS.navy : "#FFFFFF",
                      color: modoExceso === "consolidado" ? "#FFFFFF" : COLORS.text,
                      border: `1px solid ${COLORS.navy}`,
                    }}
                    className="rounded px-3 py-2 text-xs font-semibold flex-1 min-w-[160px]"
                  >
                    Consolidado
                    <span className="block font-normal" style={{ opacity: 0.8 }}>
                      {me && me.role === "admin"
                        ? `Cobra el ${remanentePct.toFixed(0)}% + recargo de ${fmtCLP(RECARGO_KM_CONSOLIDADO)}/km = ${fmtCLP(flete * (remanentePct / 100) + km_n * RECARGO_KM_CONSOLIDADO)}`
                        : `Cobra el ${remanentePct.toFixed(0)}% del tramo = ${fmtCLP(flete * (remanentePct / 100) + km_n * RECARGO_KM_CONSOLIDADO)}`}
                    </span>
                  </button>
                  <button
                    onClick={() => setModoExceso("full")}
                    style={{
                      background: modoExceso === "full" ? COLORS.navy : "#FFFFFF",
                      color: modoExceso === "full" ? "#FFFFFF" : COLORS.text,
                      border: `1px solid ${COLORS.navy}`,
                    }}
                    className="rounded px-3 py-2 text-xs font-semibold flex-1 min-w-[160px]"
                  >
                    Full
                    <span className="block font-normal" style={{ opacity: 0.8 }}>
                      Cobra el {truck.label} completo = {fmtCLP(flete)}
                    </span>
                  </button>
                </div>
              </>
            )}
            {(modoExceso || remanenteEsFull) && (
              <p style={{ color: COLORS.navy }} className="text-xs font-semibold mt-2">
                Flete total: {fmtCLP(flete)} (1er {truck.label})
                {camionesAdicionalesCompletos > 0 ? ` + ${fmtCLP(fleteCompletosAdicionales)} (adicionales llenos)` : ""}
                {` + ${fmtCLP(fleteUltimoAdicional)} (último, ${remanenteEsFull ? "full" : modoExceso}) = ${fmtCLP(fleteFinal)}`}
              </p>
            )}
          </div>
        )}
      </div>

      {requiereAutorizacionRampla && (
        <div style={{ background: "#FFF4F4", border: `1px solid ${COLORS.danger}` }} className="mt-3 mb-3 rounded-lg p-3 no-print">
          <p style={{ color: COLORS.danger }} className="text-xs flex items-center gap-1.5 font-semibold mb-1.5">
            <AlertTriangle size={13} /> Esta cotización requiere autorización del administrador
          </p>
          <p style={{ color: COLORS.text }} className="text-xs mb-2">
            Camión Rampla hacia {comunaInput} ({regionComuna}) sin que la carga supere la capacidad de un camión 3/4 ni incluya tira de 12mts.
          </p>
          {autorizacionAprobada ? (
            <p style={{ color: COLORS.navy }} className="text-xs font-semibold">
              Autorizado por {solicitudActual.resueltoPor} el {solicitudActual.resueltoFecha}. Ya puedes guardar el viaje.
            </p>
          ) : autorizacionPendiente ? (
            <p style={{ color: COLORS.muted }} className="text-xs">
              Solicitud enviada el {solicitudActual.fechaTexto}, esperando aprobación del administrador.
            </p>
          ) : (
            <>
              {solicitudActual && solicitudActual.estado === "rechazada" && (
                <p style={{ color: COLORS.danger }} className="text-xs mb-2">
                  Tu solicitud anterior fue rechazada por {solicitudActual.resueltoPor} el {solicitudActual.resueltoFecha}. Puedes volver a solicitar.
                </p>
              )}
              <button
                onClick={solicitarAutorizacion}
                style={{ background: COLORS.navy, color: "#FFFFFF" }}
                className="rounded px-3 py-2 text-xs font-semibold"
              >
                Solicitar autorización
              </button>
            </>
          )}
        </div>
      )}

      <div className="flex items-center gap-3 mb-6 no-print">
        <button
          onClick={saveTrip}
          disabled={items.length === 0 || necesitaDecision || bloqueadoPorAutorizacion}
          style={{ background: items.length > 0 && !necesitaDecision && !bloqueadoPorAutorizacion ? COLORS.navy : COLORS.border, color: "#FFFFFF" }}
          className="rounded-lg px-5 py-2.5 text-sm font-semibold disabled:cursor-not-allowed"
        >
          Guardar viaje
        </button>
        {savedMsg && <span style={{ color: COLORS.navy }} className="text-sm">{savedMsg}</span>}
        {necesitaDecision && (
          <span style={{ color: COLORS.danger }} className="text-xs">
            Define cómo cobrar el camión adicional antes de guardar.
          </span>
        )}
      </div>

      <div style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}` }} className="rounded-lg p-4">
        <div className="flex items-center justify-between flex-wrap gap-2 mb-3 no-print">
          <span style={{ color: COLORS.muted }} className="text-xs uppercase tracking-wide flex items-center gap-1.5">
            <History size={14} /> {me && me.role === "admin" ? "Historial de viajes (todos los usuarios)" : "Mi historial de viajes"} — exporta detalle por código, máx. 20
          </span>
          <div className="flex items-center gap-3">
            <button
              onClick={() => exportarExcel(tripsVisibles, cargaActualDetalle)}
              disabled={tripsVisibles.length === 0 && cargaActualDetalle.length === 0}
              style={{ color: COLORS.navy }}
              className="flex items-center gap-1 text-xs font-semibold disabled:opacity-40 hover:underline"
            >
              <FileSpreadsheet size={14} /> Excel
            </button>
            <button
              onClick={() => imprimirPDF("all")}
              disabled={tripsVisibles.length === 0 && cargaActualDetalle.length === 0}
              style={{ color: COLORS.navy }}
              className="flex items-center gap-1 text-xs font-semibold disabled:opacity-40 hover:underline"
            >
              <FileText size={14} /> PDF
            </button>
            <button
              onClick={() => enviarPorCorreo(tripsVisibles, cargaActualDetalle)}
              disabled={tripsVisibles.length === 0 && cargaActualDetalle.length === 0}
              style={{ color: COLORS.navy }}
              className="flex items-center gap-1 text-xs font-semibold disabled:opacity-40 hover:underline"
            >
              <Mail size={14} /> Correo
            </button>
          </div>
        </div>
        {tripsVisibles.length === 0 ? (
          <p style={{ color: COLORS.muted }} className="text-sm">
            Sin viajes registrados todavía.
          </p>
        ) : (
          <div className="space-y-2 max-h-64 overflow-y-auto no-print">
            {tripsVisibles.map((t) => (
              <div
                key={t.id}
                style={{ background: COLORS.panel2, border: `1px solid ${COLORS.border}` }}
                className="rounded px-3 py-2 text-xs"
              >
                <div className="flex items-center justify-between">
                  <span>
                    <span className="font-semibold">{t.user}</span>
                    <span style={{ color: COLORS.muted }}> · {t.truck} · {t.fecha}</span>
                  </span>
                  <span className="flex items-center gap-3" style={{ color: COLORS.muted }}>
                    <span>{t.pct}%</span>
                    <span style={{ color: COLORS.navy }}>{fmtCLP(t.flete)}</span>
                  </span>
                </div>
                {t.items && (
                  <div style={{ color: COLORS.muted }} className="mt-1">
                    {t.items.join(", ")}
                    {t.comuna ? ` → ${t.comuna}` : ""}
                    {t.pesoTotal ? ` · ${fmtKg(t.pesoTotal)}` : ""}
                  </div>
                )}
                {t.consolidado && (
                  <div style={{ color: "#9A6B00" }} className="mt-1 font-semibold">
                    Valor de carga Consolidada (Sujeto a consolidación de carga)
                  </div>
                )}
                <div className="flex items-center gap-3 mt-1.5">
                  <button
                    onClick={() => exportarExcel([t], [])}
                    style={{ color: COLORS.navy }}
                    className="flex items-center gap-1 text-xs font-semibold hover:underline"
                  >
                    <FileSpreadsheet size={12} /> Excel
                  </button>
                  <button
                    onClick={() => imprimirPDF(t.id)}
                    style={{ color: COLORS.navy }}
                    className="flex items-center gap-1 text-xs font-semibold hover:underline"
                  >
                    <FileText size={12} /> PDF
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Printable view: max 20 rows, simple table for PDF via window.print() */}
        <div className="print-only">
          <h2 style={{ color: COLORS.navy }}>
            {pdfTarget === "all" ? "Detalle de códigos calculados (todos los viajes)" : "Detalle de código calculado"}
          </h2>
          <table style={{ width: "100%", fontSize: 11, borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                <th style={{ textAlign: "left", padding: 4 }}>Código</th>
                <th style={{ textAlign: "left", padding: 4 }}>Producto</th>
                <th style={{ textAlign: "left", padding: 4 }}>Cantidad</th>
                <th style={{ textAlign: "left", padding: 4 }}>% Camión</th>
                <th style={{ textAlign: "left", padding: 4 }}>Peso (kg)</th>
                <th style={{ textAlign: "left", padding: 4 }}>Origen</th>
              </tr>
            </thead>
            <tbody>
              {filasParaImprimir.map((r, i) => (
                <tr key={i} style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                  <td style={{ padding: 4 }}>{r.codigo}</td>
                  <td style={{ padding: 4 }}>{r.desc}</td>
                  <td style={{ padding: 4 }}>{r.cantidad} {r.um}</td>
                  <td style={{ padding: 4 }}>{r.pct}%</td>
                  <td style={{ padding: 4 }}>{r.peso || "-"}</td>
                  <td style={{ padding: 4 }}>{r.origen}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(CubicacionApp));
</script>
</body>
</html>
